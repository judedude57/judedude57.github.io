function generateName() {
    const race = document.getElementById("race").value;
    const type = document.getElementById("nameType").value;

    const first = names[race].first[Math.floor(Math.random() * names[race].first.length)];
    const last = names[race].last[Math.floor(Math.random() * names[race].last.length)];

    let output = "";

    if (type === "first") output = first;
    else if (type === "last") output = last;
    else output = first + " " + last;

    document.getElementById("result").innerText = output;
}
