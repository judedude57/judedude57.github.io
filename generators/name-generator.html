<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Name Generator – Infinite Play</title>
    <style>
        body {
            background: #111;
            color: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* Page wrapper */
        .page-wrapper {
            width: 100%;
            max-width: 900px;
            margin: 40px auto;
            background: #1b1b1b;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        /* Buttons */
        .btn {
            display: inline-block;
            margin: 10px;
            padding: 14px 22px;
            background: #222;
            color: white;
            font-size: 18px;
            border-radius: 10px;
            border: 2px solid #444;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

        .btn:hover {
            background: #333;
            transform: scale(1.08);
            border-color: #7a2cff;
            box-shadow: 0 0 15px #7a2cff, 0 0 30px #7a2cff;
        }

        #output {
            margin-top: 25px;
            font-size: 28px;
            font-weight: bold;
            color: #9d7dff;
            text-shadow: 0 0 10px #7a2cff;
        }

        /* Home button */
        .home-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            background: #222;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 18px;
            border: 1px solid #444;
            transition: 0.25s;
        }

        .home-btn:hover {
            background: #333;
            transform: scale(1.05);
            border-color: #7a2cff;
            box-shadow: 0 0 10px #7a2cff;
        }

        /* Ad space box */
        .ad-space {
            width: 100%;
            height: 120px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            margin-top: 40px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>

<a href="https://judedude57.github.io" class="home-btn">Home</a>

<div class="page-wrapper">
    <h1>Name Generator</h1>

    <div>
        <button class="btn" onclick="setMode('first')">First Name</button>
        <button class="btn" onclick="setMode('last')">Last Name</button>
        <button class="btn" onclick="setMode('full')">Full Name</button>
    </div>

    <button class="btn" onclick="generate()">Generate</button>

    <h2 id="output"></h2>

    <!-- Ad space placeholder -->
    <div class="ad-space">
        Ad Space (paste your code here)
    </div>
</div>

<script>
let mode = "full";

function setMode(m) {
    mode = m;
}

function generate() {
    const firstNames = [
        "Alex","Jordan","Taylor","Sky","Riley","Casey","Morgan","Jude","Emma","Bailey",
        "Matthew","Hunter","Gus","John","Peter","Liam","Noah","Ava","Sophia","Mason",
        "Ella","James","Lucas","Mia","Harper","Ethan","Logan","Zoe","Nova","Kai",
        "Aria","Leo","Ezra","Willow","Rowan","Sage","River","Autumn","Jasper","Felix"
    ];

    const lastNames = [
        "Smith","Johnson","Brown","Davis","Miller","Wilson","Moore","Campbell","Meyer",
        "Peterson","Anderson","Thompson","Walker","Bennett","Reed","Foster","Hayes",
        "Griffin","Knight","Warren","Hughes","Stevens","Coleman","Brooks","Parker"
    ];

    let result = "";

    if (mode === "first") {
        result = firstNames[Math.floor(Math.random() * firstNames.length)];
    } else if (mode === "last") {
        result = lastNames[Math.floor(Math.random() * lastNames.length)];
    } else {
        const first = firstNames[Math.floor(Math.random() * firstNames.length)];
        const last = lastNames[Math.floor(Math.random() * lastNames.length)];
        result = first + " " + last;
    }

    document.getElementById("output").innerText = result;
}
</script>

</body>
</html>
