<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Calculator – Infinite Play</title>
    <meta name="viewport" content="width=device-width,initial-scale=1">

    <!-- PROPELLERADS MULTI-TAG -->
    <script>
        (function(s){
            var z = s.createElement('script');
            z.src = 'https://n6wxm.com/vignette.min.js';
            z.dataset.zone = '10952010';
            (s.head || s.body).appendChild(z);
        })(document);
    </script>

    <style>
        :root{
            --bg:#111;
            --panel:#1b1b1b;
            --card:#202020;
            --accent:#7a2cff;
            --muted:#ccc;
            --glass: rgba(255,255,255,0.03);
        }
        html,body{height:100%;margin:0;background:var(--bg);color:#f5f5f5;font-family:Arial,Helvetica,sans-serif}
        .page {
            min-height:100%;
            display:flex;
            align-items:center;
            justify-content:center;
            padding:40px 20px;
            box-sizing:border-box;
        }

        /* SUPPORT CARD (RIGHT) */
        .support-card {
            position:fixed;
            top:110px;
            right:12px;
            width:220px;
            background:var(--panel);
            border:1px solid #333;
            border-radius:10px;
            padding:14px;
            text-align:center;
            z-index:9999;
            box-shadow:0 6px 20px rgba(0,0,0,0.6);
            transition:transform .25s ease, box-shadow .25s ease;
        }
        .support-card h3{margin:0 0 10px;font-size:16px}
        .support-card a{
            display:inline-block;padding:10px 12px;background:#222;border-radius:8px;color:#fff;text-decoration:none;border:2px solid #444;
        }
        .support-card a:hover{transform:scale(1.04);border-color:var(--accent);box-shadow:0 0 12px var(--accent)}

        /* MAIN PANEL */
        .panel {
            width:100%;
            max-width:420px;
            background:var(--panel);
            border-radius:14px;
            padding:20px;
            box-shadow:0 10px 40px rgba(0,0,0,0.6);
            border:1px solid #222;
            text-align:center;
            position:relative;
            overflow:hidden;
        }
        .brand {
            font-size:18px;
            margin-bottom:8px;
            color:#fff;
            text-shadow:0 0 8px var(--accent);
        }
        .desc { color:var(--muted); font-size:13px; margin-bottom:14px }

        /* DISPLAY */
        .display {
            background:var(--card);
            border-radius:10px;
            padding:14px 12px;
            text-align:right;
            font-size:28px;
            letter-spacing:1px;
            color:#fff;
            border:1px solid #2b2b2b;
            box-shadow: inset 0 -6px 18px rgba(0,0,0,0.6);
            min-height:56px;
            display:flex;
            align-items:center;
            justify-content:space-between;
            gap:12px;
        }
        .display .expr { font-size:14px; color:var(--muted); opacity:0.9; max-width:60%; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
        .display .result { font-weight:700; font-family:monospace; font-size:22px; }

        /* KEYPAD */
        .keypad {
            margin-top:14px;
            display:grid;
            grid-template-columns: repeat(4,1fr);
            gap:10px;
        }
        .btn {
            background:var(--card);
            border-radius:10px;
            padding:14px 8px;
            font-size:18px;
            color:#fff;
            border:1px solid #2b2b2b;
            cursor:pointer;
            transition:transform .12s ease, box-shadow .12s ease, background .12s ease;
            box-shadow:0 6px 18px rgba(0,0,0,0.45);
        }
        .btn:active{transform:translateY(2px)}
        .btn:hover{transform:translateY(-4px); box-shadow:0 14px 30px rgba(122,44,255,0.12)}
        .btn.op { background: linear-gradient(180deg,#2a1a3a,#24102b); border:1px solid rgba(122,44,255,0.18); color:#fff; box-shadow:0 8px 24px rgba(122,44,255,0.08) }
        .btn.wide { grid-column: span 2; }
        .btn.danger { background:linear-gradient(180deg,#3a1a1a,#2b0f0f); border:1px solid rgba(255,80,80,0.12) }

        /* AD SPACE */
        .ad-space {
            margin-top:16px;
            background:var(--glass);
            border-radius:8px;
            padding:10px;
            border:1px solid #222;
            color:var(--muted);
            font-size:13px;
        }

        /* FOOTER */
        .tools {
            margin-top:12px;
            display:flex;
            gap:8px;
            justify-content:center;
            align-items:center;
            color:var(--muted);
            font-size:13px;
        }
        .tools a { color:var(--muted); text-decoration:none; border-bottom:1px dashed rgba(255,255,255,0.04) }

        @media (max-width:600px){
            .support-card{display:none}
            .panel{margin:0 12px}
        }
    </style>
</head>
<body>
    <!-- SUPPORT CARD -->
    <div class="support-card" aria-hidden="false">
        <h3>Support Future Projects</h3>
        <a href="https://omg10.com/4/10952010" target="_blank" rel="noopener">Support Infinite Play</a>
    </div>

    <div class="page">
        <div class="panel" role="application" aria-label="Calculator">
            <div class="brand">Infinite Play — Calculator</div>
            <div class="desc">Basic arithmetic: addition, subtraction, multiplication, division. Accurate, fast, and easy to use.</div>

            <div class="display" id="display" aria-live="polite">
                <div class="expr" id="expr">&nbsp;</div>
                <div class="result" id="result">0</div>
            </div>

            <div class="keypad" role="group" aria-label="Calculator keypad">
                <button class="btn danger" data-action="clear" title="Clear">C</button>
                <button class="btn" data-action="back" title="Backspace">⌫</button>
                <button class="btn" data-value="%" title="Percent">%</button>
                <button class="btn op" data-value="/" title="Divide">÷</button>

                <button class="btn" data-value="7">7</button>
                <button class="btn" data-value="8">8</button>
                <button class="btn" data-value="9">9</button>
                <button class="btn op" data-value="*" title="Multiply">×</button>

                <button class="btn" data-value="4">4</button>
                <button class="btn" data-value="5">5</button>
                <button class="btn" data-value="6">6</button>
                <button class="btn op" data-value="-" title="Subtract">−</button>

                <button class="btn" data-value="1">1</button>
                <button class="btn" data-value="2">2</button>
                <button class="btn" data-value="3">3</button>
                <button class="btn op" data-value="+" title="Add">+</button>

                <button class="btn" data-value="0" class="wide">0</button>
                <button class="btn" data-value="." title="Decimal">.</button>
                <button class="btn wide op" data-action="equals" title="Equals">=</button>
            </div>

            <div class="ad-space" id="ad-space">
                <!-- PropellerAds banner placeholder (Multi‑Tag handles formats) -->
                Global Ad Space (loaded automatically)
            </div>

            <div class="tools">
                <span>Quick actions:</span>
                <a href="#" id="copyBtn">Copy result</a>
                <a href="Menus/Games.html">Games</a>
                <a href="Menus/tools.html">Tools</a>
            </div>
        </div>
    </div>

<script>
(function(){
    const exprEl = document.getElementById('expr');
    const resultEl = document.getElementById('result');
    const keypad = document.querySelector('.keypad');
    let expression = '';
    let lastInput = '';
    let justEvaluated = false;

    function updateDisplay(){
        exprEl.textContent = expression || '\u00A0';
        resultEl.textContent = computePreview() ?? '0';
    }

    function safeEval(expr){
        // Replace unicode operators with JS equivalents
        const sanitized = expr.replace(/÷/g, '/').replace(/×/g, '*').replace(/−/g, '-').replace(/%/g, '/100');
        try {
            // Disallow any characters except digits, operators, decimal, parentheses, spaces
            if (!/^[0-9+\-*/().\s]+$/.test(sanitized)) return null;
            // Evaluate using Function to avoid eval direct usage
            const fn = new Function('return (' + sanitized + ')');
            const val = fn();
            if (!isFinite(val)) return null;
            // Round to reasonable precision to avoid floating errors
            return Math.round((val + Number.EPSILON) * 1e12) / 1e12;
        } catch (e) {
            return null;
        }
    }

    function computePreview(){
        if (!expression) return '0';
        const val = safeEval(expression);
        return val === null ? '' : String(val);
    }

    function pressValue(v){
        if (justEvaluated && /[0-9.]/.test(v)) {
            expression = '';
            justEvaluated = false;
        }
        // Prevent multiple operators in a row
        if (/[+\-*/]/.test(v)) {
            if (!expression) return;
            if (/[+\-*/]$/.test(expression)) {
                expression = expression.slice(0, -1) + v;
            } else {
                expression += v;
            }
            justEvaluated = false;
        } else if (v === '.') {
            // Prevent multiple decimals in current number
            const parts = expression.split(/[+\-*/]/);
            const cur = parts[parts.length - 1] || '';
            if (cur.includes('.')) return;
            expression += '.';
            justEvaluated = false;
        } else if (v === '%') {
            // percent: convert current number to percent (e.g., 50% => 0.5)
            const parts = expression.split(/[+\-*/]/);
            const cur = parts.pop() || '';
            if (!cur) return;
            expression = parts.join('') + (parts.length ? expression.match(/[+\-*/]$/) ? '' : '' : '') + '(' + cur + '/100)';
            justEvaluated = false;
        } else {
            expression += v;
            justEvaluated = false;
        }
        lastInput = v;
        updateDisplay();
    }

    function clearAll(){
        expression = '';
        lastInput = '';
        justEvaluated = false;
        updateDisplay();
    }

    function backspace(){
        if (!expression) return;
        expression = expression.slice(0, -1);
        updateDisplay();
    }

    function evaluate(){
        const val = safeEval(expression);
        if (val === null) {
            resultEl.textContent = 'Error';
            return;
        }
        resultEl.textContent = String(val);
        expression = String(val);
        justEvaluated = true;
    }

    keypad.addEventListener('click', function(e){
        const btn = e.target.closest('button');
        if (!btn) return;
        const v = btn.getAttribute('data-value');
        const action = btn.getAttribute('data-action');
        if (action === 'clear') { clearAll(); return; }
        if (action === 'back') { backspace(); return; }
        if (action === 'equals') { evaluate(); return; }
        if (v !== null) pressValue(v);
    });

    // Keyboard support
    window.addEventListener('keydown', function(e){
        if (e.key === 'Enter') { e.preventDefault(); evaluate(); return; }
        if (e.key === 'Backspace') { e.preventDefault(); backspace(); return; }
        if (e.key === 'Escape') { e.preventDefault(); clearAll(); return; }
        const allowed = '0123456789+-*/.%()';
        if (allowed.includes(e.key)) {
            e.preventDefault();
            // Map * / - + . % ( ) and digits directly
            pressValue(e.key);
        }
    });

    // Copy result
    document.getElementById('copyBtn').addEventListener('click', function(e){
        e.preventDefault();
        const text = resultEl.textContent || '';
        if (!text) return;
        navigator.clipboard?.writeText(text).then(function(){
            const old = resultEl.textContent;
            resultEl.textContent = 'Copied';
            setTimeout(()=> resultEl.textContent = old, 900);
        }).catch(()=>{ /* ignore */ });
    });

    // Initialize
    clearAll();
})();
</script>
</body>
</html>
