<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Password Generator – Infinite Play</title>

    <!-- PROPELLERADS MULTI-TAG -->
    <script>
        (function(s,u,b,i,z){
            z = s.createElement('script');
            z.src = 'https://n6wxm.com/vignette.min.js';
            z.dataset.zone = '10952010';
            (s.head || s.body).appendChild(z);
        })(document);
    </script>

    <style>
        body {
            background: #111;
            color: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        /* HOME BUTTON */
        .home-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            background: #222;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 18px;
            border: 1px solid #444;
            transition: 0.25s;
            z-index: 99999;
        }
        .home-btn:hover {
            background: #333;
            transform: scale(1.05);
            border-color: #7a2cff;
            box-shadow: 0 0 10px #7a2cff;
        }

        /* SUPPORT CARD (RIGHT SIDE) */
        .support-card {
            position: fixed;
            top: 120px;
            right: 10px;
            width: 220px;
            background: #1b1b1b;
            border: 1px solid #333;
            border-radius: 8px;
            padding: 15px;
            z-index: 9999;
            text-align: center;
            box-shadow: 0 0 12px rgba(0,0,0,0.6);
            animation: fadeIn 0.8s ease-out;
        }
        .support-card h3 {
            margin: 0 0 10px;
            font-size: 18px;
        }
        .support-btn {
            display: inline-block;
            padding: 10px 14px;
            background: #222;
            color: white;
            border-radius: 8px;
            text-decoration: none;
            border: 2px solid #444;
            transition: 0.25s ease;
        }
        .support-btn:hover {
            background: #333;
            border-color: #7a2cff;
            transform: scale(1.07);
            box-shadow: 0 0 15px #7a2cff;
        }

        /* MAIN BOX */
        .box {
            margin: 120px auto;
            background: #1b1b1b;
            padding: 30px;
            width: 90%;
            max-width: 600px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
            animation: fadeInUp 0.6s ease-out;
        }

        h1 {
            font-size: 36px;
            margin-bottom: 20px;
            text-shadow: 0 0 10px #7a2cff;
            animation: glowPulse 2.5s infinite ease-in-out;
        }

        /* OPTIONS */
        .options {
            text-align: left;
            margin: 20px auto;
            width: 80%;
            font-size: 18px;
        }
        .options label {
            display: block;
            margin: 10px 0;
        }

        /* BUTTON */
        .gen-btn {
            padding: 14px 20px;
            background: #222;
            color: white;
            border-radius: 8px;
            border: 2px solid #444;
            font-size: 20px;
            cursor: pointer;
            transition: 0.25s ease;
        }
        .gen-btn:hover {
            background: #333;
            transform: scale(1.08);
            border-color: #7a2cff;
            box-shadow: 0 0 15px #7a2cff;
        }

        /* OUTPUT */
        #output {
            margin-top: 25px;
            font-size: 26px;
            word-break: break-all;
            padding: 10px;
            background: #222;
            border-radius: 8px;
            border: 1px solid #444;
        }

        /* ANIMATIONS */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes glowPulse {
            0% { text-shadow: 0 0 5px #7a2cff; }
            50% { text-shadow: 0 0 20px #7a2cff; }
            100% { text-shadow: 0 0 5px #7a2cff; }
        }

        @media (max-width: 900px) {
            .support-card {
                display: none;
            }
        }
    </style>
</head>
<body>

<a href="https://judedude57.github.io" class="home-btn">Home</a>

<!-- SUPPORT CARD -->
<div class="support-card">
    <h3>Support Future Projects</h3>
    <a href="https://omg10.com/4/10952010" class="support-btn" target="_blank">
        Support Infinite Play
    </a>
</div>

<div class="box">
    <h1>Password Generator</h1>

    <div class="options">
        <label>
            Password Length:
            <input type="number" id="length" min="1" max="20" value="12">
        </label>

        <label><input type="checkbox" id="upper" checked> Include Uppercase (A–Z)</label>
        <label><input type="checkbox" id="lower" checked> Include Lowercase (a–z)</label>
        <label><input type="checkbox" id="numbers" checked> Include Numbers (0–9)</label>
        <label><input type="checkbox" id="symbols" checked> Include Symbols (!@#$%)</label>
    </div>

    <button class="gen-btn" onclick="generate()">Generate Password</button>

    <h2 id="output"></h2>
</div>

<script>
function generate() {
    let length = document.getElementById("length").value;

    let chars = "";
    if (document.getElementById("upper").checked) chars += "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
    if (document.getElementById("lower").checked) chars += "abcdefghijklmnopqrstuvwxyz";
    if (document.getElementById("numbers").checked) chars += "0123456789";
    if (document.getElementById("symbols").checked) chars += "!@#$%";

    if (chars.length === 0) {
        document.getElementById("output").innerText = "Select at least one character type.";
        return;
    }

    let pass = "";
    for (let i = 0; i < length; i++) {
        pass += chars[Math.floor(Math.random() * chars.length)];
    }

    document.getElementById("output").innerText = pass;
}
</script>

</body>
</html>
