<!DOCTYPE html>
<html>
<head>
    <title>Feedback Admin</title>
</head>
<body style="background:#000; color:#0ff; font-family:Arial; padding:20px;">

<script>
// ASK FOR PASSCODE
const pass = prompt("Enter passcode:");

// CHECK PASSCODE
if (pass !== "676941") {
    document.body.innerHTML = "<h2>Access Denied</h2>";
} else {
    // LOAD FEEDBACK FILE
    fetch("feedback.json")
        .then(res => res.json())
        .then(data => {
            document.body.innerHTML = "<h1>Feedback Admin</h1>";
            document.body.innerHTML += "<pre style='white-space:pre-wrap;'>" + JSON.stringify(data, null, 2) + "</pre>";
        })
        .catch(err => {
            document.body.innerHTML = "<h2>Error loading feedback</h2>";
        });
}
</script>

</body>
</html>
