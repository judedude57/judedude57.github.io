<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Infinite Play Portal Thumbnail</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      background: #050510;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }

    .portal-wrapper {
      /* Thumbnail size */
      width: 800px;
      height: 450px;
      border-radius: 24px;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      text-decoration: none;
      display: block;
    }

    /* Outer glow + border */
    .portal-border {
      position: absolute;
      inset: 0;
      border-radius: 24px;
      padding: 3px;
      background: radial-gradient(circle at 20% 0%, #ff4df0, transparent 55%),
                  radial-gradient(circle at 80% 100%, #4d9dff, transparent 55%),
                  radial-gradient(circle at 50% 50%, #7b3cff, #050510 70%);
    }

    .portal-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 20px;
      background: radial-gradient(circle at 50% 20%, #2b1a5a 0, #050510 55%, #000000 100%);
      overflow: hidden;
    }

    /* Floating particles */
    .particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #ffffff;
      box-shadow: 0 0 12px rgba(255, 255, 255, 0.9);
      opacity: 0.7;
      animation: float 8s linear infinite;
    }

    .particle:nth-child(1) { top: 10%; left: 20%; animation-duration: 7s; }
    .particle:nth-child(2) { top: 30%; left: 80%; animation-duration: 9s; }
    .particle:nth-child(3) { top: 70%; left: 15%; animation-duration: 10s; }
    .particle:nth-child(4) { top: 60%; left: 60%; animation-duration: 6s; }
    .particle:nth-child(5) { top: 40%; left: 40%; animation-duration: 11s; }

    @keyframes float {
      0%   { transform: translateY(0) scale(1); opacity: 0.3; }
      50%  { transform: translateY(-20px) scale(1.2); opacity: 1; }
      100% { transform: translateY(0) scale(1); opacity: 0.3; }
    }

    /* Portal ring */
    .portal-ring {
      position: absolute;
      width: 320px;
      height: 320px;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background:
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.2) 0, transparent 60%),
        conic-gradient(from 0deg, #ff4df0, #4d9dff, #7bffb2, #ff4df0);
      filter: blur(1px);
      opacity: 0.9;
      box-shadow:
        0 0 40px rgba(255, 77, 240, 0.7),
        0 0 80px rgba(77, 157, 255, 0.6);
      animation: spin 18s linear infinite;
    }

    @keyframes spin {
      from { transform: translate(-50%, -50%) rotate(0deg); }
      to   { transform: translate(-50%, -50%) rotate(360deg); }
    }

    /* Inner dark core to make logo pop */
    .portal-core {
      position: absolute;
      width: 220px;
      height: 220px;
      border-radius: 50%;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle at 50% 50%, #050510 0, #050510 60%, transparent 100%);
      box-shadow:
        0 0 40px rgba(0, 0, 0, 0.9),
        0 0 80px rgba(0, 0, 0, 0.9);
    }

    /* Logo */
    .logo {
      position: absolute;
      width: 180px;
      height: auto;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      filter: drop-shadow(0 0 18px rgba(255, 255, 255, 0.9));
    }

    /* Text block */
    .text-block {
      position: absolute;
      bottom: 32px;
      left: 40px;
      color: #ffffff;
      text-shadow: 0 0 12px rgba(0, 0, 0, 0.9);
    }

    .headline {
      font-size: 32px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      font-weight: 700;
    }

    .headline span {
      color: #9b7bff;
    }

    .subline {
      margin-top: 6px;
      font-size: 16px;
      opacity: 0.85;
    }

    .cta-pill {
      margin-top: 14px;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 8px 16px;
      border-radius: 999px;
      background: linear-gradient(90deg, #ff4df0, #4d9dff);
      font-size: 14px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      box-shadow:
        0 0 18px rgba(255, 77, 240, 0.7),
        0 0 28px rgba(77, 157, 255, 0.7);
    }

    .cta-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ffffff;
    }

    /* Hover effect */
    .portal-wrapper:hover .portal-inner {
      transform: scale(1.02);
      transition: transform 0.25s ease-out;
    }

    .portal-wrapper:hover .portal-ring {
      box-shadow:
        0 0 60px rgba(255, 77, 240, 0.9),
        0 0 120px rgba(77, 157, 255, 0.9);
    }
  </style>
</head>
<body>

  <!-- Clickable thumbnail -->
  <a class="portal-wrapper" href="https://infiniteplaygames.github.io" target="_blank">
    <div class="portal-border">
      <div class="portal-inner">
        <!-- Particles -->
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>
        <div class="particle"></div>

        <!-- Portal layers -->
        <div class="portal-ring"></div>
        <div class="portal-core"></div>

        <!-- Your logo (only asset needed) -->
        <!-- Replace src with your actual logo path -->
        <img class="logo" src="Assets/InfinitePlayLogo.png" alt="Infinite Play Logo">

        <!-- Text -->
        <div class="text-block">
          <div class="headline">
            ENTER <span>INFINITE PLAY</span>
          </div>
          <div class="subline">
            Free browser games & tools · No login · Play instantly
          </div>
          <div class="cta-pill">
            <div class="cta-dot"></div>
            PLAY NOW
          </div>
        </div>
      </div>
    </div>
  </a>

</body>
</html>
