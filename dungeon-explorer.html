<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dungeon Explorer</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            background: #111;
            color: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
        }
        .container {
            max-width: 800px;
            margin: 80px auto 40px;
            padding: 20px;
            background: #1b1b1b;
            border-radius: 8px;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
        }
        h1 {
            text-align: center;
            margin-top: 0;
        }
        #stats {
            display: flex;
            justify-content: space-between;
            margin-bottom: 15px;
            font-size: 14px;
        }
        #log {
            min-height: 180px;
            max-height: 260px;
            overflow-y: auto;
            padding: 10px;
            background: #101010;
            border-radius: 6px;
            border: 1px solid #333;
            margin-bottom: 15px;
            font-size: 15px;
            line-height: 1.4;
        }
        .log-entry {
            margin-bottom: 8px;
        }
        .log-entry span.label {
            color: #888;
        }
        #choices {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
        }
        button.choice {
            flex: 1 1 45%;
            padding: 10px;
            background: #2b2b2b;
            color: #f5f5f5;
            border: 1px solid #444;
            border-radius: 6px;
            cursor: pointer;
            font-size: 15px;
            transition: background 0.15s, transform 0.1s;
        }
        button.choice:hover {
            background: #3a3a3a;
            transform: translateY(-1px);
        }
        button.choice:disabled {
            opacity: 0.4;
            cursor: default;
            transform: none;
        }
        #message {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }
        #restart {
            margin-top: 15px;
            padding: 10px 15px;
            background: #444;
            color: #f5f5f5;
            border: 1px solid #666;
            border-radius: 6px;
            cursor: pointer;
            display: none;
        }
        #restart:hover {
            background: #555;
        }
        a.home-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            background: #222;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 16px;
            z-index: 99999;
        }
        @media (max-width: 600px) {
            .container {
                margin-top: 70px;
                margin-left: 10px;
                margin-right: 10px;
            }
            button.choice {
                flex: 1 1 100%;
            }
        }
    </style>
</head>
<body>

<a href="https://judedude57.github.io" class="home-btn">Home</a>

<div class="container">
    <h1>Dungeon Explorer</h1>

    <div id="stats">
        <div>HP: <span id="hp">20</span></div>
        <div>Attack: <span id="atk">3</span></div>
        <div>Gold: <span id="gold">0</span></div>
        <div>Floor: <span id="floor">1</span></div>
    </div>

    <div id="log"></div>

    <div id="choices">
        <button class="choice" id="exploreBtn">Explore the dungeon</button>
        <button class="choice" id="restBtn">Rest (recover HP)</button>
        <button class="choice" id="shopBtn">Check for a merchant</button>
        <button class="choice" id="descendBtn">Descend to next floor</button>
    </div>

    <div id="message"></div>
    <button id="restart">Restart Adventure</button>
</div>

<script>
(function() {
    const hpEl = document.getElementById('hp');
    const atkEl = document.getElementById('atk');
    const goldEl = document.getElementById('gold');
    const floorEl = document.getElementById('floor');
    const logEl = document.getElementById('log');
    const messageEl = document.getElementById('message');
    const restartBtn = document.getElementById('restart');

    const exploreBtn = document.getElementById('exploreBtn');
    const restBtn = document.getElementById('restBtn');
    const shopBtn = document.getElementById('shopBtn');
    const descendBtn = document.getElementById('descendBtn');

    let state;

    function initGame() {
        state = {
            hp: 20,
            maxHp: 20,
            atk: 3,
            gold: 0,
            floor: 1,
            alive: true
        };
        updateStats();
        logEl.innerHTML = '';
        messageEl.textContent = 'You stand at the entrance of a dark dungeon. Will you survive its depths?';
        restartBtn.style.display = 'none';
        setButtonsEnabled(true);
        addLog('You tighten your grip on your weapon and step into the darkness...', 'system');
    }

    function updateStats() {
        hpEl.textContent = state.hp;
        atkEl.textContent = state.atk;
        goldEl.textContent = state.gold;
        floorEl.textContent = state.floor;
    }

    function addLog(text, type) {
        const div = document.createElement('div');
        div.className = 'log-entry';
        if (type === 'system') {
            div.innerHTML = '<span class="label">[Dungeon]</span> ' + text;
        } else if (type === 'combat') {
            div.innerHTML = '<span class="label">[Combat]</span> ' + text;
        } else if (type === 'loot') {
            div.innerHTML = '<span class="label">[Loot]</span> ' + text;
        } else if (type === 'event') {
            div.innerHTML = '<span class="label">[Event]</span> ' + text;
        } else {
            div.textContent = text;
        }
        logEl.appendChild(div);
        logEl.scrollTop = logEl.scrollHeight;
    }

    function setButtonsEnabled(enabled) {
        [exploreBtn, restBtn, shopBtn, descendBtn].forEach(btn => {
            btn.disabled = !enabled;
        });
    }

    function randomInt(min, max) {
        return Math.floor(Math.random() * (max - min + 1)) + min;
    }

    function checkDeath() {
        if (state.hp <= 0) {
            state.hp = 0;
            updateStats();
            state.alive = false;
            addLog('You collapse to the cold stone floor. The dungeon claims another soul.', 'system');
            messageEl.textContent = 'You died on floor ' + state.floor + ' with ' + state.gold + ' gold.';
            setButtonsEnabled(false);
            restartBtn.style.display = 'inline-block';
            return true;
        }
        return false;
    }

    function explore() {
        if (!state.alive) return;
        const roll = randomInt(1, 100);

        if (roll <= 45) {
            // Monster encounter
            monsterEncounter();
        } else if (roll <= 70) {
            // Treasure
            const goldFound = randomInt(3, 12) + state.floor;
            state.gold += goldFound;
            updateStats();
            addLog('You find a dusty chest containing ' + goldFound + ' gold.', 'loot');
            messageEl.textContent = 'You pocket the gold and move on.';
        } else if (roll <= 85) {
            // Trap
            const dmg = randomInt(2, 6) + Math.floor(state.floor / 2);
            state.hp -= dmg;
            updateStats();
            addLog('A hidden trap springs! You take ' + dmg + ' damage.', 'event');
            messageEl.textContent = 'You grit your teeth and keep going.';
            checkDeath();
        } else {
            // Strange event
            const eventRoll = randomInt(1, 3);
            if (eventRoll === 1) {
                const heal = randomInt(3, 7);
                const oldHp = state.hp;
                state.hp = Math.min(state.maxHp, state.hp + heal);
                updateStats();
                addLog('You find a faintly glowing fountain. You drink and recover ' + (state.hp - oldHp) + ' HP.', 'event');
                messageEl.textContent = 'You feel a little stronger.';
            } else if (eventRoll === 2) {
                const atkGain = 1;
                state.atk += atkGain;
                updateStats();
                addLog('You discover an old weapon rack and claim a sharper blade. Attack +1.', 'event');
                messageEl.textContent = 'Your strikes will hit harder now.';
            } else {
                addLog('You wander through empty corridors. The silence is unsettling.', 'event');
                messageEl.textContent = 'Nothing happens... this time.';
            }
        }
    }

    function monsterEncounter() {
        const baseHp = 6 + state.floor * 2;
        const baseAtk = 2 + Math.floor(state.floor / 2);
        const monster = {
            hp: randomInt(baseHp - 2, baseHp + 2),
            atk: randomInt(baseAtk - 1, baseAtk + 1),
        };

        const monsters = ['Goblin', 'Skeleton', 'Cave Rat', 'Shadow Wraith', 'Cultist', 'Stone Golem Fragment'];
        const name = monsters[randomInt(0, monsters.length - 1)];

        addLog('A ' + name + ' appears! (HP: ' + monster.hp + ', ATK: ' + monster.atk + ')', 'combat');
        messageEl.textContent = 'You engage the ' + name + ' in battle.';

        // Simple turn-based combat simulation
        while (monster.hp > 0 && state.hp > 0) {
            const playerDmg = randomInt(state.atk - 1, state.atk + 2);
            const monsterDmg = randomInt(monster.atk - 1, monster.atk + 1);

            monster.hp -= Math.max(1, playerDmg);
            addLog('You strike the ' + name + ' for ' + Math.max(1, playerDmg) + ' damage.', 'combat');

            if (monster.hp <= 0) {
                const goldGain = randomInt(4, 10) + state.floor;
                state.gold += goldGain;
                updateStats();
                addLog('The ' + name + ' collapses. You loot ' + goldGain + ' gold.', 'loot');

                // Chance to gain small heal or buff
                const rewardRoll = randomInt(1, 100);
                if (rewardRoll <= 25) {
                    const heal = randomInt(2, 6);
                    const oldHp = state.hp;
                    state.hp = Math.min(state.maxHp, state.hp + heal);
                    updateStats();
                    addLog('You catch your breath after the fight and recover ' + (state.hp - oldHp) + ' HP.', 'event');
                } else if (rewardRoll <= 35) {
                    state.atk += 1;
                    updateStats();
                    addLog('You feel more confident in battle. Attack +1.', 'event');
                }

                messageEl.textContent = 'You defeated the ' + name + '.';
                return;
            }

            state.hp -= Math.max(1, monsterDmg);
            updateStats();
            addLog('The ' + name + ' hits you for ' + Math.max(1, monsterDmg) + ' damage.', 'combat');

            if (checkDeath()) {
                return;
            }
        }
    }

    function rest() {
        if (!state.alive) return;
        const chance = randomInt(1, 100);
        if (chance <= 70) {
            const heal = randomInt(4, 9);
            const oldHp = state.hp;
            state.hp = Math.min(state.maxHp, state.hp + heal);
            updateStats();
            addLog('You find a relatively safe corner and rest, recovering ' + (state.hp - oldHp) + ' HP.', 'event');
            messageEl.textContent = 'You feel a bit more prepared.';
        } else {
            addLog('As you try to rest, you hear something moving nearby. You stay alert instead.', 'event');
            messageEl.textContent = 'No rest for the wary.';
        }
    }

    function shop() {
        if (!state.alive) return;
        const chance = randomInt(1, 100);
        if (chance <= 50) {
            addLog('You search around but find no sign of a merchant on this floor.', 'event');
            messageEl.textContent = 'Just more dust and cobwebs.';
            return;
        }

        addLog('A hooded merchant emerges from the shadows, offering wares.', 'event');

        const options = [
            { type: 'heal', cost: 8 + state.floor * 2, value: 10 },
            { type: 'atk', cost: 12 + state.floor * 3, value: 1 },
            { type: 'maxHp', cost: 15 + state.floor * 3, value: 3 }
        ];

        const choice = options[randomInt(0, options.length - 1)];
        let desc = '';
        if (choice.type === 'heal') desc = 'potion that restores 10 HP';
        if (choice.type === 'atk') desc = 'sharpened weapon (+1 Attack)';
        if (choice.type === 'maxHp') desc = 'talisman that increases max HP by 3';

        if (state.gold < choice.cost) {
            addLog('The merchant offers a ' + desc + ' for ' + choice.cost + ' gold, but you cannot afford it.', 'event');
            messageEl.textContent = 'You walk away empty-handed.';
            return;
        }

        // Auto-buy for simplicity
        state.gold -= choice.cost;
        if (choice.type === 'heal') {
            const oldHp = state.hp;
            state.hp = Math.min(state.maxHp, state.hp + choice.value);
            addLog('You buy the potion and recover ' + (state.hp - oldHp) + ' HP.', 'event');
        } else if (choice.type === 'atk') {
            state.atk += choice.value;
            addLog('You buy the weapon. Attack +1.', 'event');
        } else if (choice.type === 'maxHp') {
            state.maxHp += choice.value;
            state.hp += choice.value;
            addLog('You buy the talisman. Max HP +3.', 'event');
        }
        updateStats();
        messageEl.textContent = 'The merchant vanishes as quickly as they appeared.';
    }

    function descend() {
        if (!state.alive) return;
        state.floor += 1;
        state.maxHp += 1;
        state.hp = Math.min(state.maxHp, state.hp + 2);
        updateStats();
        addLog('You find a stairway leading deeper. You descend to floor ' + state.floor + '.', 'system');

        if (state.floor === 5) {
            addLog('You sense a powerful presence below...', 'system');
        }
        if (state.floor === 7) {
            addLog('The air grows heavy. You know something terrible awaits.', 'system');
        }
        if (state.floor === 10) {
            bossEncounter();
        } else {
            messageEl.textContent = 'The dungeon grows more dangerous, but so do you.';
        }
    }

    function bossEncounter() {
        addLog('You enter a vast chamber. A Dungeon Lord rises from a throne of bones.', 'system');
        messageEl.textContent = 'This is it. The final battle.';

        const boss = {
            name: 'Dungeon Lord',
            hp: 80,
            atk: 7
        };

        setButtonsEnabled(false);

        function bossTurn() {
            if (!state.alive) return;

            const playerDmg = randomInt(state.atk - 1, state.atk + 3);
            const bossDmg = randomInt(boss.atk - 2, boss.atk + 2);

            boss.hp -= Math.max(1, playerDmg);
            addLog('You strike the ' + boss.name + ' for ' + Math.max(1, playerDmg) + ' damage.', 'combat');

            if (boss.hp <= 0) {
                addLog('The Dungeon Lord roars and crumbles into dust.', 'combat');
                const rewardGold = 100 + state.floor * 10;
                state.gold += rewardGold;
                updateStats();
                addLog('You claim a hoard of ' + rewardGold + ' gold and a legendary victory.', 'loot');
                messageEl.textContent = 'You have conquered the dungeon!';
                state.alive = false;
                restartBtn.style.display = 'inline-block';
                return;
            }

            state.hp -= Math.max(1, bossDmg);
            updateStats();
            addLog('The ' + boss.name + ' smashes you for ' + Math.max(1, bossDmg) + ' damage.', 'combat');

            if (checkDeath()) {
                return;
            }

            // Continue the fight with a slight delay for readability
            setTimeout(bossTurn, 600);
        }

        setTimeout(bossTurn, 600);
    }

    exploreBtn.addEventListener('click', explore);
    restBtn.addEventListener('click', rest);
    shopBtn.addEventListener('click', shop);
    descendBtn.addEventListener('click', descend);
    restartBtn.addEventListener('click', initGame);

    initGame();
})();
</script>
