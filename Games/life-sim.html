<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Life Sim — InfinitePlayGames</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    body {
      background: #050816;
      color: #f5f5f5;
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      width: 100%;
      padding: 20px;
    }
    h1 {
      margin-top: 0;
      text-align: center;
      color: #7df9ff;
      text-shadow: 0 0 10px #7df9ff55;
    }
    .stats, .choices, .log {
      background: #0b1020;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 0 15px #000;
    }
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.95rem;
    }
    .stat {
      background: #11172a;
      padding: 8px 10px;
      border-radius: 6px;
    }
    .label {
      color: #9ca3af;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .value {
      font-size: 1rem;
      font-weight: 600;
    }
    .choices h2, .log h2 {
      margin-top: 0;
      font-size: 1.1rem;
      color: #a5b4fc;
    }
    .choice-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    button.choice {
      background: #1d243b;
      color: #e5e7eb;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    button.choice:hover {
      background: #273152;
      box-shadow: 0 0 10px #6366f155;
      transform: translateY(-1px);
    }
    button.choice:disabled {
      opacity: 0.4;
      cursor: default;
      box-shadow: none;
      transform: none;
    }
    .log-content {
      max-height: 260px;
      overflow-y: auto;
      font-size: 0.9rem;
    }
    .log-entry {
      margin-bottom: 6px;
      border-bottom: 1px solid #111827;
      padding-bottom: 4px;
    }
    .year-label {
      color: #60a5fa;
      font-weight: 600;
      margin-right: 4px;
    }
    .game-over {
      color: #f97373;
      font-weight: 700;
      margin-top: 10px;
    }
  </style>
</head>
<body>
<div class="container">
  <h1>Life Sim — InfinitePlayGames</h1>

  <div class="stats">
    <div class="stats-row">
      <div class="stat">
        <div class="label">Age</div>
        <div class="value" id="age"></div>
      </div>
      <div class="stat">
        <div class="label">Money</div>
        <div class="value" id="money"></div>
      </div>
      <div class="stat">
        <div class="label">Health</div>
        <div class="value" id="health"></div>
      </div>
      <div class="stat">
        <div class="label">Happiness</div>
        <div class="value" id="happiness"></div>
      </div>
      <div class="stat">
        <div class="label">Hunger</div>
        <div class="value" id="hunger"></div>
      </div>
      <div class="stat">
        <div class="label">Education</div>
        <div class="value" id="education"></div>
      </div>
      <div class="stat">
        <div class="label">Job</div>
        <div class="value" id="job"></div>
      </div>
      <div class="stat">
        <div class="label">Relationship</div>
        <div class="value" id="relationship"></div>
      </div>
      <div class="stat">
        <div class="label">Home</div>
        <div class="value" id="home"></div>
      </div>
      <div class="stat">
        <div class="label">Children</div>
        <div class="value" id="children"></div>
      </div>
    </div>
  </div>

  <div class="choices">
    <h2>Choices for this year</h2>
    <div class="choice-list" id="choiceList"></div>
  </div>

  <div class="log">
    <h2>Life Log</h2>
    <div class="log-content" id="log"></div>
    <div class="game-over" id="gameOver"></div>
  </div>
</div>

<script>
  const state = {
    age: 3,
    money: 0,
    health: 80,
    happiness: 70,
    hunger: 60, // 0 = starving, 100 = full
    educationLevel: 0, // 0 none, 1 school, 2 high school, 3 college
    job: null,
    relationshipStatus: "Single",
    partner: null,
    children: [],
    home: "Living with family",
    alive: true,
    year: 1
  };

  const logEl = document.getElementById("log");
  const choiceListEl = document.getElementById("choiceList");
  const gameOverEl = document.getElementById("gameOver");

  function log(message) {
    const entry = document.createElement("div");
    entry.className = "log-entry";
    entry.innerHTML = `<span class="year-label">Age ${state.age}:</span> ${message}`;
    logEl.prepend(entry);
  }

  function clamp(val, min, max) {
    return Math.max(min, Math.min(max, val));
  }

  function updateStatsUI() {
    document.getElementById("age").textContent = state.age;
    document.getElementById("money").textContent = `$${state.money.toLocaleString()}`;
    document.getElementById("health").textContent = `${state.health}/100`;
    document.getElementById("happiness").textContent = `${state.happiness}/100`;
    document.getElementById("hunger").textContent = `${state.hunger}/100`;

    const eduMap = ["None", "School", "High School", "College"];
    document.getElementById("education").textContent = eduMap[state.educationLevel] || "None";
    document.getElementById("job").textContent = state.job || "None";
    document.getElementById("relationship").textContent = state.relationshipStatus;
    document.getElementById("home").textContent = state.home;
    document.getElementById("children").textContent = state.children.length;
  }

  function checkLifeStatus() {
    if (!state.alive) return;

    if (state.health <= 0 || state.hunger <= 0) {
      state.alive = false;
      gameOverEl.textContent = "Your life has ended. Refresh the page to start a new life.";
      choiceListEl.innerHTML = "";
      log("Your body couldn’t keep going. Game over.");
      return;
    }

    if (state.age >= 100) {
      state.alive = false;
      gameOverEl.textContent = "You lived a long life. Refresh to start a new one.";
      choiceListEl.innerHTML = "";
      log("You reached old age and passed peacefully.");
    }
  }

  function endOfYearEffects() {
    // Natural aging effects
    state.age += 1;
    state.hunger = clamp(state.hunger - 15, 0, 100);
    state.health = clamp(state.health - (state.hunger < 30 ? 10 : 2), 0, 100);

    if (state.happiness < 30) {
      state.health = clamp(state.health - 3, 0, 100);
    }

    if (state.age > 60) {
      state.health = clamp(state.health - 3, 0, 100);
    }

    checkLifeStatus();
  }

  function addChoice(label, handler, condition = true) {
    if (!condition) return;
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = label;
    btn.onclick = () => {
      if (!state.alive) return;
      handler();
      updateStatsUI();
      checkLifeStatus();
      if (state.alive) {
        endOfYearEffects();
        updateStatsUI();
        renderChoices();
      }
    };
    choiceListEl.appendChild(btn);
  }

  function renderChoices() {
    choiceListEl.innerHTML = "";

    if (!state.alive) return;

    // Age-based phases
    if (state.age <= 5) {
      addChoice("Play with toys", () => {
        state.happiness = clamp(state.happiness + 10, 0, 100);
        state.hunger = clamp(state.hunger - 5, 0, 100);
        log("You spent the year playing and exploring. Childhood vibes.");
      });
      addChoice("Stay close to family", () => {
        state.happiness = clamp(state.happiness + 5, 0, 100);
        log("You stayed close to family and felt safe.");
      });
    } else if (state.age <= 12) {
      addChoice("Go to school", () => {
        state.educationLevel = Math.max(state.educationLevel, 1);
        state.happiness = clamp(state.happiness - 5, 0, 100);
        log("You attended school and learned the basics.");
      });
      addChoice("Play with friends", () => {
        state.happiness = clamp(state.happiness + 10, 0, 100);
        state.health = clamp(state.health + 2, 0, 100);
        log("You played with friends and had a great time.");
      });
      addChoice("Stay home and chill", () => {
        state.happiness = clamp(state.happiness + 3, 0, 100);
        log("You had a quiet year at home.");
      });
    } else if (state.age <= 18) {
      addChoice("Focus on school", () => {
        state.educationLevel = Math.max(state.educationLevel, 2);
        state.happiness = clamp(state.happiness - 5, 0, 100);
        log("You focused on your studies and finished high school.");
      });
      addChoice("Part-time job", () => {
        const income = 800 + Math.floor(Math.random() * 400);
        state.money += income;
        state.happiness = clamp(state.happiness - 3, 0, 100);
        state.health = clamp(state.health - 2, 0, 100);
        log(`You worked a part-time job and earned $${income}.`);
      });
      addChoice("Hang out and have fun", () => {
        state.happiness = clamp(state.happiness + 12, 0, 100);
        state.money = Math.max(0, state.money - 50);
        log("You spent the year hanging out and enjoying life.");
      });
    } else {
      // Adult life
      addChoice("Look for a job / improve career", () => {
        if (!state.job) {
          if (state.educationLevel >= 3) {
            state.job = "Office Job";
            log("You landed an office job.");
          } else if (state.educationLevel >= 2) {
            state.job = "Retail Job";
            log("You got a retail job.");
          } else {
            state.job = "Basic Labor Job";
            log("You found a basic labor job.");
          }
        } else {
          const raise = 500 + Math.floor(Math.random() * 500);
          state.money += raise;
          log(`You improved at your job and earned a bonus of $${raise}.`);
        }
        state.happiness = clamp(state.happiness - 3, 0, 100);
      });

      addChoice("Work full-time", () => {
        let income = 0;
        if (state.job === "Office Job") income = 4000 + Math.floor(Math.random() * 1500);
        else if (state.job === "Retail Job") income = 2500 + Math.floor(Math.random() * 800);
        else if (state.job === "Basic Labor Job") income = 2200 + Math.floor(Math.random() * 700);
        else income = 1500 + Math.floor(Math.random() * 500);

        state.money += income;
        state.health = clamp(state.health - 5, 0, 100);
        state.happiness = clamp(state.happiness - 2, 0, 100);
        state.hunger = clamp(state.hunger - 10, 0, 100);
        log(`You worked hard this year and earned $${income}.`);
      });

      addChoice("Take care of yourself (eat, rest, relax)", () => {
        state.hunger = clamp(state.hunger + 25, 0, 100);
        state.health = clamp(state.health + 10, 0, 100);
        state.happiness = clamp(state.happiness + 8, 0, 100);
        state.money = Math.max(0, state.money - 200);
        log("You focused on food, rest, and mental wellbeing this year.");
      });

      addChoice("Study / go to college", () => {
        if (state.educationLevel < 3) {
          state.educationLevel = 3;
          state.money = Math.max(0, state.money - 2000);
          state.happiness = clamp(state.happiness - 5, 0, 100);
          log("You studied hard and completed college.");
        } else {
          log("You already have a solid education. You did some extra courses.");
          state.happiness = clamp(state.happiness + 2, 0, 100);
        }
      });

      // Relationship & family
      if (state.relationshipStatus === "Single") {
        addChoice("Start dating", () => {
          const success = Math.random() < 0.7;
          if (success) {
            state.relationshipStatus = "In a relationship";
            state.partner = { name: "Partner", happiness: 70 };
            state.happiness = clamp(state.happiness + 12, 0, 100);
            log("You met someone and started a relationship.");
          } else {
            state.happiness = clamp(state.happiness - 5, 0, 100);
            log("Dating didn’t work out this year.");
          }
        });
      } else if (state.relationshipStatus === "In a relationship") {
        addChoice("Strengthen relationship", () => {
          state.happiness = clamp(state.happiness + 8, 0, 100);
          log("You spent quality time with your partner.");
        });
        addChoice("Get married", () => {
          state.relationshipStatus = "Married";
          state.happiness = clamp(state.happiness + 15, 0, 100);
          log("You got married and started a new chapter.");
        });
        addChoice("Break up", () => {
          state.relationshipStatus = "Single";
          state.partner = null;
          state.happiness = clamp(state.happiness - 10, 0, 100);
          log("You ended the relationship.");
        });
      } else if (state.relationshipStatus === "Married") {
        addChoice("Spend time with family", () => {
          state.happiness = clamp(state.happiness + 10, 0, 100);
          log("You spent time with your partner and family.");
        });
        addChoice("Have a child", () => {
          const childName = `Child ${state.children.length + 1}`;
          state.children.push({ name: childName, age: 0 });
          state.happiness = clamp(state.happiness + 12, 0, 100);
          state.money = Math.max(0, state.money - 500);
          log(`You welcomed ${childName} into your family.`);
        });
        addChoice("Consider divorce", () => {
          const chance = Math.random();
          if (chance < 0.5) {
            state.relationshipStatus = "Single";
            state.partner = null;
            state.money = Math.max(0, state.money - 2000);
            state.happiness = clamp(state.happiness - 15, 0, 100);
            log("You went through a divorce. It was rough emotionally and financially.");
          } else {
            state.happiness = clamp(state.happiness - 5, 0, 100);
            log("You decided to work things out and stay together.");
          }
        });
      }

      // Housing
      if (state.home === "Living with family") {
        addChoice("Rent an apartment", () => {
          if (state.money >= 2000) {
            state.money -= 2000;
            state.home = "Rented apartment";
            state.happiness = clamp(state.happiness + 8, 0, 100);
            log("You moved into your own rented apartment.");
          } else {
            log("You don’t have enough money to move out yet.");
          }
        });
      } else if (state.home === "Rented apartment") {
        addChoice("Buy a small house", () => {
          if (state.money >= 20000) {
            state.money -= 20000;
            state.home = "Small house";
            state.happiness = clamp(state.happiness + 12, 0, 100);
            log("You bought a small house. Big milestone.");
          } else {
            log("You need more savings to buy a house.");
          }
        });
      } else if (state.home === "Small house") {
        addChoice("Upgrade to big house", () => {
          if (state.money >= 60000) {
            state.money -= 60000;
            state.home = "Big house";
            state.happiness = clamp(state.happiness + 15, 0, 100);
            log("You upgraded to a big house. Life feels comfortable.");
          } else {
            log("You don’t have enough money to upgrade your home.");
          }
        });
        addChoice("Sell house and rent", () => {
          state.money += 30000;
          state.home = "Rented apartment";
          state.happiness = clamp(state.happiness - 5, 0, 100);
          log("You sold your house and went back to renting.");
        });
      } else if (state.home === "Big house") {
        addChoice("Maintain big house", () => {
          state.money = Math.max(0, state.money - 3000);
          state.happiness = clamp(state.happiness + 5, 0, 100);
          log("You maintained your big house and enjoyed the comfort.");
        });
        addChoice("Downsize to small house", () => {
          state.money += 30000;
          state.home = "Small house";
          state.happiness = clamp(state.happiness - 3, 0, 100);
          log("You downsized to a smaller house to save money.");
        });
      }

      // Free time
      addChoice("Take a year to relax", () => {
        state.happiness = clamp(state.happiness + 10, 0, 100);
        state.health = clamp(state.health + 5, 0, 100);
        state.money = Math.max(0, state.money - 1000);
        log("You took a slower year to rest and reset.");
      });
    }
  }

  // Init
  updateStatsUI();
  log("Your life begins at age 3. See where it goes.");
  renderChoices();
</script>
</body>
</html>
