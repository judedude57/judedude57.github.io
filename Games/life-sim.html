<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Life Sim — InfinitePlayGames</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO TAGS -->

  <meta name="keywords" content="life simulator, life sim game, infiniteplaygames, browser sim, free life game, grow up game, life choices game">
  <meta name="robots" content="index, follow">

  <!-- SCHEMA.ORG JSON-LD -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "VideoGame",
    "name": "Life Sim",
    "url": "https://infiniteplaygames.github.io/Games/LifeSim/life-sim.html",
    "image": "https://infiniteplaygames.github.io/Assets/lifesim-thumb.png",
    "author": {
      "@type": "Organization",
      "name": "InfinitePlayGames"
    },
    "description": "A browser-based life simulator where you grow from age 3 to adulthood, build a career, start a family, and shape your destiny.",
    "genre": "Simulation",
    "operatingSystem": "Web Browser",
    "applicationCategory": "Game"
  }
  </script>

  <style>
    body {
      background: #050816;
      color: #f5f5f5;
      font-family: system-ui, sans-serif;
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: flex-start;
      min-height: 100vh;
    }
    .container {
      max-width: 900px;
      width: 100%;
      padding: 20px;
    }
    h1 {
      margin-top: 0;
      text-align: center;
      color: #7df9ff;
      text-shadow: 0 0 10px #7df9ff55;
    }
    .stats, .choices, .log {
      background: #0b1020;
      border-radius: 10px;
      padding: 15px;
      margin-bottom: 15px;
      box-shadow: 0 0 15px #000;
    }
    .stats-row {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      font-size: 0.95rem;
    }
    .stat {
      background: #11172a;
      padding: 8px 10px;
      border-radius: 6px;
    }
    .label {
      color: #9ca3af;
      font-size: 0.8rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    .value {
      font-size: 1rem;
      font-weight: 600;
    }
    .choices h2, .log h2 {
      margin-top: 0;
      font-size: 1.1rem;
      color: #a5b4fc;
    }
    .choice-list {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
    }
    button.choice {
      background: #1d243b;
      color: #e5e7eb;
      border: 1px solid #374151;
      border-radius: 6px;
      padding: 8px 12px;
      cursor: pointer;
      font-size: 0.9rem;
      transition: background 0.15s, transform 0.1s, box-shadow 0.15s;
    }
    button.choice:hover {
      background: #273152;
      box-shadow: 0 0 10px #6366f155;
      transform: translateY(-1px);
    }
    .log-content {
      max-height: 260px;
      overflow-y: auto;
      font-size: 0.9rem;
    }
    .log-entry {
      margin-bottom: 6px;
      border-bottom: 1px solid #111827;
      padding-bottom: 4px;
    }
    .year-label {
      color: #60a5fa;
      font-weight: 600;
      margin-right: 4px;
    }
    .back-btn {
      display: inline-block;
      margin-bottom: 15px;
      background: #1d243b;
      padding: 10px 14px;
      border-radius: 6px;
      color: #e5e7eb;
      text-decoration: none;
      border: 1px solid #374151;
      transition: 0.15s;
    }
    .back-btn:hover {
      background: #273152;
      box-shadow: 0 0 10px #6366f155;
    }
  </style>
</head>

<body>

<!-- GLOBAL INFINITEPLAY AD LOADER -->
<script src="/Ads/adloader.js"></script>

<div class="container">

  <a href="/Menus/Games.html" class="back-btn">← Back to Games Menu</a>

  <h1>Life Sim — InfinitePlayGames</h1>

  <div class="stats">
    <div class="stats-row">
      <div class="stat"><div class="label">Age</div><div class="value" id="age"></div></div>
      <div class="stat"><div class="label">Money</div><div class="value" id="money"></div></div>
      <div class="stat"><div class="label">Health</div><div class="value" id="health"></div></div>
      <div class="stat"><div class="label">Happiness</div><div class="value" id="happiness"></div></div>
      <div class="stat"><div class="label">Hunger</div><div class="value" id="hunger"></div></div>
      <div class="stat"><div class="label">Education</div><div class="value" id="education"></div></div>
      <div class="stat"><div class="label">Job</div><div class="value" id="job"></div></div>
      <div class="stat"><div class="label">Relationship</div><div class="value" id="relationship"></div></div>
      <div class="stat"><div class="label">Home</div><div class="value" id="home"></div></div>
      <div class="stat"><div class="label">Children</div><div class="value" id="children"></div></div>
    </div>
  </div>

  <div class="choices">
    <h2>Choices for this year</h2>
    <div class="choice-list" id="choiceList"></div>
  </div>

  <div class="log">
    <h2>Life Log</h2>
    <div class="log-content" id="log"></div>
  </div>

</div>

<script>
  const state = {
    age: 3,
    money: 0,
    health: 90,
    happiness: 80,
    hunger: 80,
    educationLevel: 0,
    job: null,
    relationshipStatus: "Single",
    partner: null,
    children: [],
    home: "Living with family",
    alive: true
  };

  const logEl = document.getElementById("log");
  const choiceListEl = document.getElementById("choiceList");

  function log(msg) {
    const div = document.createElement("div");
    div.className = "log-entry";
    div.innerHTML = `<span class="year-label">Age ${state.age}:</span> ${msg}`;
    logEl.prepend(div);
  }

  function clamp(v, min, max) {
    return Math.max(min, Math.min(max, v));
  }

  function updateUI() {
    document.getElementById("age").textContent = state.age;
    document.getElementById("money").textContent = "$" + state.money;
    document.getElementById("health").textContent = state.health;
    document.getElementById("happiness").textContent = state.happiness;
    document.getElementById("hunger").textContent = state.hunger;

    const edu = ["None", "School", "High School", "College"];
    document.getElementById("education").textContent = edu[state.educationLevel];

    document.getElementById("job").textContent = state.job || "None";
    document.getElementById("relationship").textContent = state.relationshipStatus;
    document.getElementById("home").textContent = state.home;
    document.getElementById("children").textContent = state.children.length;
  }

  function endYear() {
    state.age++;
    state.hunger = clamp(state.hunger - 8, 0, 100);
    state.health = clamp(state.health - (state.hunger < 20 ? 5 : 1), 0, 100);

    if (state.happiness < 20) {
      state.health = clamp(state.health - 2, 0, 100);
    }

    if (state.age > 75) {
      state.health = clamp(state.health - 2, 0, 100);
    }

    if (state.health <= 0 || state.hunger <= 0) {
      state.alive = false;
      log("Your life ended. Refresh to restart.");
      choiceListEl.innerHTML = "";
    }
  }

  function addChoice(label, fn, cond = true) {
    if (!cond) return;
    const btn = document.createElement("button");
    btn.className = "choice";
    btn.textContent = label;
    btn.onclick = () => {
      if (!state.alive) return;
      fn();
      updateUI();
      if (state.alive) {
        endYear();
        updateUI();
        renderChoices();
      }
    };
    choiceListEl.appendChild(btn);
  }

  function renderChoices() {
    choiceListEl.innerHTML = "";
    if (!state.alive) return;

    if (state.age <= 5) {
      addChoice("Play with toys", () => {
        state.happiness += 10;
        state.hunger -= 3;
        log("You played happily.");
      });
      addChoice("Stay with family", () => {
        state.happiness += 5;
        log("You stayed close to family.");
      });
    }

    else if (state.age <= 12) {
      addChoice("Go to school", () => {
        state.educationLevel = Math.max(state.educationLevel, 1);
        state.happiness -= 2;
        log("You learned new things.");
      });
      addChoice("Play with friends", () => {
        state.happiness += 12;
        state.health += 2;
        log("You had fun with friends.");
      });
      addChoice("Stay home", () => {
        state.happiness += 4;
        log("You relaxed at home.");
      });
    }

    else if (state.age <= 18) {
      addChoice("Study hard", () => {
        state.educationLevel = Math.max(state.educationLevel, 2);
        state.happiness -= 3;
        log("You focused on school.");
      });
      addChoice("Part-time job", () => {
        const pay = 600 + Math.floor(Math.random() * 400);
        state.money += pay;
        log("You earned $" + pay);
      });
      addChoice("Hang out", () => {
        state.happiness += 10;
        state.money -= 20;
        log("You chilled with friends.");
      });
    }

    else {
      addChoice("Work", () => {
        let pay = 2000 + Math.floor(Math.random() * 1500);
        state.money += pay;
        state.hunger -= 5;
        state.happiness -= 1;
        log("You worked and earned $" + pay);
      });

      addChoice("Take care of yourself", () => {
        state.hunger = clamp(state.hunger + 25, 0, 100);
        state.health = clamp(state.health + 15, 0, 100);
        state.happiness = clamp(state.happiness + 10, 0, 100);
        state.money -= 150;
        log("You rested, ate well, and recovered.");
      });

      addChoice("Study more", () => {
        if (state.educationLevel < 3) {
          state.educationLevel = 3;
          state.money -= 1500;
          log("You completed college.");
        } else {
          log("You took extra courses.");
        }
      });

      if (state.relationshipStatus === "Single") {
        addChoice("Start dating", () => {
          if (Math.random() < 0.7) {
            state.relationshipStatus = "In a relationship";
            log("You started dating someone.");
          } else {
            log("Dating didn’t work out.");
          }
        });
      } else if (state.relationshipStatus === "In a relationship") {
        addChoice("Get married", () => {
          state.relationshipStatus = "Married";
          log("You got married.");
        });
        addChoice("Break up", () => {
          state.relationshipStatus = "Single";
          log("You ended the relationship.");
        });
      } else if (state.relationshipStatus === "Married") {
        addChoice("Have a child", () => {
          const name = "Child " + (state.children.length + 1);
          state.children.push({ name, age: 0 });
          log("You had " + name);
        });
        addChoice("Spend time with family", () => {
          state.happiness += 10;
          log("You enjoyed family time.");
        });
      }

      if (state.home === "Living with family") {
        addChoice("Rent apartment", () => {
          if (state.money >= 1500) {
            state.money -= 1500;
            state.home = "Rented apartment";
            log("You moved out.");
          } else log("Not enough money.");
        });
      } else if (state.home === "Rented apartment") {
        addChoice("Buy small house", () => {
          if (state.money >= 15000) {
            state.money -= 15000;
            state.home = "Small house";
            log("You bought a small house.");
          } else log("Not enough money.");
        });
      } else if (state.home === "Small house") {
        addChoice("Upgrade to big house", () => {
          if (state.money >= 50000) {
            state.money -= 50000;
            state.home = "Big house";
            log("You upgraded your home.");
          } else log("Not enough money.");
        });
      }
    }
  }

  updateUI();
  log("Your life begins at age 3.");
  renderChoices();
</script>

</body>
</html>
