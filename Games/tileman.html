<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tile Runner 2.0 – Infinite Play</title>
<style>
    body {
        background: #111;
        color: #f5f5f5;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        text-align: center;
        overflow: hidden;
    }

    .top-bar {
        padding: 10px;
        background: #1b1b1b;
        border-bottom: 2px solid #333;
        box-shadow: 0 0 10px #000;
        position: relative;
        z-index: 10;
    }

    input, button {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #222;
        color: white;
        margin: 5px;
    }

    button:hover {
        background: #333;
        border-color: #7a2cff;
        box-shadow: 0 0 10px #7a2cff;
    }

    canvas {
        background: #000;
        display: block;
        margin: 0 auto;
        border: 2px solid #333;
        border-radius: 8px;
        box-shadow: 0 0 20px #000;
    }

    .ad-space {
        width: 100%;
        height: 100px;
        background: #1a1a1a;
        border: 1px solid #333;
        border-radius: 8px;
        margin-top: 10px;
        color: #777;
        display: flex;
        justify-content: center;
        align-items: center;
    }
</style>
</head>
<body>

<div class="top-bar">
    Name: <input id="playerName" value="Player">
    Color: <input type="color" id="playerColor" value="#00ff88">
    <button onclick="startGame()">Start</button>
    <span style="margin-left:20px;">Score: <span id="score">0</span></span>
    <span style="margin-left:20px;">Best: <span id="best">0</span></span>
</div>

<canvas id="game" width="800" height="600"></canvas>

<div class="ad-space">Ad Space (paste code here)</div>

<script>
/* === CONFIG === */
const MAP_SIZE = 200;          // 200x200 tiles
const TILE_SIZE = 32;          // pixel size of each tile
const MOVE_DELAY = 120;        // ms between moves (speed control)

/* === GAME STATE === */
let player = { x: 100, y: 100, dx: 1, dy: 0, color: "#00ff88" };
let claimed = new Set();
let trail = [];
let score = 0;
let best = 0;
let lastMove = 0;
let running = false;

/* === CANVAS === */
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

/* === TEXTURE === */
function drawFloorTile(x, y) {
    ctx.fillStyle = "#1a1a1a";
    ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);

    ctx.fillStyle = "#222";
    ctx.fillRect(x + 4, y + 4, TILE_SIZE - 8, TILE_SIZE - 8);
}

/* === START GAME === */
function startGame() {
    player.x = 100;
    player.y = 100;
    player.dx = 1;
    player.dy = 0;
    player.color = document.getElementById("playerColor").value;

    claimed.clear();
    trail = [];
    score = 0;
    document.getElementById("score").innerText = score;

    running = true;
    requestAnimationFrame(loop);
}

/* === GAME LOOP === */
function loop(timestamp) {
    if (!running) return;

    if (timestamp - lastMove > MOVE_DELAY) {
        lastMove = timestamp;
        update();
    }

    draw();
    requestAnimationFrame(loop);
}

/* === UPDATE === */
function update() {
    player.x += player.dx;
    player.y += player.dy;

    if (player.x < 0 || player.x >= MAP_SIZE || player.y < 0 || player.y >= MAP_SIZE) {
        return gameOver();
    }

    const key = player.x + "," + player.y;

    if (trail.includes(key)) return gameOver();

    trail.push(key);
    if (!claimed.has(key)) {
        claimed.add(key);
        score++;
        document.getElementById("score").innerText = score;

        if (score > best) {
            best = score;
            document.getElementById("best").innerText = best;
            localStorage.setItem("tileBest", best);
        }
    }

    if (trail.length > 200) trail.shift();
}

/* === DRAW === */
function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const camX = player.x * TILE_SIZE - canvas.width / 2;
    const camY = player.y * TILE_SIZE - canvas.height / 2;

    for (let gx = 0; gx < MAP_SIZE; gx++) {
        for (let gy = 0; gy < MAP_SIZE; gy++) {
            const px = gx * TILE_SIZE - camX;
            const py = gy * TILE_SIZE - camY;

            if (px < -TILE_SIZE || py < -TILE_SIZE || px > canvas.width || py > canvas.height) continue;

            drawFloorTile(px, py);
        }
    }

    ctx.fillStyle = player.color + "88";
    trail.forEach(t => {
        const [tx, ty] = t.split(",").map(Number);
        ctx.fillRect(tx * TILE_SIZE - camX, ty * TILE_SIZE - camY, TILE_SIZE, TILE_SIZE);
    });

    ctx.fillStyle = player.color;
    ctx.fillRect(player.x * TILE_SIZE - camX, player.y * TILE_SIZE - camY, TILE_SIZE, TILE_SIZE);
}

/* === GAME OVER === */
function gameOver() {
    running = false;
    alert("Game Over! Score: " + score);
}

/* === CONTROLS === */
document.addEventListener("keydown", e => {
    if (!running) return;

    if (e.key === "ArrowUp" || e.key === "w") { player.dx = 0; player.dy = -1; }
    if (e.key === "ArrowDown" || e.key === "s") { player.dx = 0; player.dy = 1; }
    if (e.key === "ArrowLeft" || e.key === "a") { player.dx = -1; player.dy = 0; }
    if (e.key === "ArrowRight" || e.key === "d") { player.dx = 1; player.dy = 0; }
});

/* === LOAD BEST SCORE === */
best = parseInt(localStorage.getItem("tileBest") || "0");
document.getElementById("best").innerText = best;
</script>

</body>
</html>
