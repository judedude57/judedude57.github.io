<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Tile Runner 3.0 – Neon Grid</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
    body {
        background: #050509;
        color: #f5f5f5;
        font-family: Arial, sans-serif;
        margin: 0;
        padding: 0;
        text-align: center;
        overflow: hidden;
    }

    .top-bar {
        padding: 8px 10px;
        background: #0b0b12;
        border-bottom: 2px solid #222;
        box-shadow: 0 0 15px #000;
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 10px;
        flex-wrap: wrap;
        z-index: 10;
        position: relative;
    }

    .top-bar input,
    .top-bar button {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #444;
        background: #151525;
        color: #f5f5f5;
        font-size: 14px;
    }

    .top-bar button {
        cursor: pointer;
        border: 1px solid #7a2cff;
    }

    .top-bar button:hover {
        background: #1f1f35;
        box-shadow: 0 0 10px #7a2cff;
    }

    .wrapper {
        display: flex;
        flex-direction: row;
        justify-content: center;
        align-items: flex-start;
        gap: 10px;
        padding: 10px;
    }

    #gameCanvas {
        background: #020208;
        border-radius: 10px;
        border: 2px solid #222;
        box-shadow: 0 0 25px #000;
    }

    .side-panel {
        width: 260px;
        background: #0b0b14;
        border-radius: 10px;
        border: 1px solid #222;
        box-shadow: 0 0 20px #000;
        padding: 10px;
        box-sizing: border-box;
        text-align: left;
        font-size: 13px;
    }

    #minimap {
        width: 100%;
        border-radius: 8px;
        border: 1px solid #333;
        background: #050510;
        box-shadow: 0 0 10px #000;
    }

    .panel-title {
        font-size: 14px;
        margin-bottom: 4px;
        color: #9d7dff;
    }

    .leaderboard-list {
        list-style: none;
        padding-left: 0;
        margin: 4px 0 0;
        max-height: 140px;
        overflow-y: auto;
    }

    .leaderboard-list li {
        padding: 2px 0;
        border-bottom: 1px solid #222;
        font-size: 12px;
    }

    .ad-space {
        width: 100%;
        height: 80px;
        background: #05050b;
        border-radius: 8px;
        border: 1px solid #222;
        margin-top: 8px;
        display: flex;
        align-items: center;
        justify-content: center;
        color: #666;
        font-size: 12px;
    }

    .tag {
        color: #888;
        font-size: 11px;
    }

    .stat {
        color: #ddd;
        font-size: 12px;
    }

    a.home-btn {
        position: fixed;
        top: 10px;
        left: 10px;
        background: #151525;
        color: white;
        padding: 8px 12px;
        border-radius: 6px;
        text-decoration: none;
        font-size: 14px;
        border: 1px solid #444;
        transition: 0.25s;
        z-index: 9999;
    }
    a.home-btn:hover {
        background: #1f1f35;
        transform: scale(1.05);
        border-color: #7a2cff;
        box-shadow: 0 0 10px #7a2cff;
    }
</style>
</head>
<body>

<a href="../index.html" class="home-btn">Home</a>

<div class="top-bar">
    Name: <input id="playerName" value="Player">
    Color: <input type="color" id="playerColor" value="#00ffcc">
    <button onclick="startGame()">Start / Restart</button>
    <span class="stat">Score: <span id="score">0</span></span>
    <span class="stat">Best: <span id="best">0</span></span>
    <span class="stat">Zoom: <span id="zoomLabel">1.0x</span></span>
</div>

<div class="wrapper">
    <canvas id="gameCanvas" width="900" height="600"></canvas>

    <div class="side-panel">
        <div class="panel-title">Mini‑Map</div>
        <canvas id="minimap" width="220" height="220"></canvas>

        <div class="panel-title" style="margin-top:8px;">Power‑Ups</div>
        <div class="tag">
            ⚡ Speed | 🐢 Slow | 🛡 Shield | ✖2 Score
        </div>
        <div class="stat" id="powerStatus">None active</div>

        <div class="panel-title" style="margin-top:8px;">Leaderboard (Top 10)</div>
        <ul class="leaderboard-list" id="leaderboard"></ul>

        <div class="ad-space">
            Ad Space (paste your ad code here)
        </div>
    </div>
</div>

<script>
/* === CONFIG === */
const MAP_SIZE = 400;
const TILE_SIZE = 24;
const BASE_DELAY = 140;
const BOT_COUNT = 5;

const POWER_DURATION = 6000;

/* === STATE === */
let canvas = document.getElementById("gameCanvas");
let ctx = canvas.getContext("2d");
let mini = document.getElementById("minimap");
let mctx = mini.getContext("2d");

let player = {
    x: Math.floor(MAP_SIZE / 2),
    y: Math.floor(MAP_SIZE / 2),
    dx: 1,
    dy: 0,
    color: "#00ffcc",
    shield: false
};

let bots = [];
let claimed = new Set();
let trail = [];
let score = 0;
let best = 0;
let running = false;
let lastMove = 0;
let moveDelay = BASE_DELAY;
let zoom = 1.0;

let powerUps = [];
let activePower = null;
let powerEndTime = 0;

/* === UTILS === */
function key(x, y) {
    return x + "," + y;
}

function randInt(min, max) {
    return Math.floor(Math.random() * (max - min)) + min;
}

/* === INIT BOTS === */
function initBots() {
    bots = [];
    for (let i = 0; i < BOT_COUNT; i++) {
        bots.push({
            x: randInt(10, MAP_SIZE - 10),
            y: randInt(10, MAP_SIZE - 10),
            dx: Math.random() < 0.5 ? 1 : -1,
            dy: 0,
            color: `hsl(${randInt(0,360)}, 80%, 60%)`,
            alive: true
        });
    }
}

/* === POWER UPS === */
const POWER_TYPES = ["speed", "slow", "shield", "mult"];

function spawnPowerUp() {
    if (powerUps.length > 6) return;
    const type = POWER_TYPES[randInt(0, POWER_TYPES.length)];
    powerUps.push({
        x: randInt(5, MAP_SIZE - 5),
        y: randInt(5, MAP_SIZE - 5),
        type
    });
}

function applyPower(type) {
    activePower = type;
    powerEndTime = performance.now() + POWER_DURATION;
    player.shield = false;
    moveDelay = BASE_DELAY;

    if (type === "speed") moveDelay = 80;
    if (type === "slow") moveDelay = 220;
    if (type === "shield") player.shield = true;
    if (type === "mult") moveDelay = BASE_DELAY;

    const status = {
        speed: "⚡ Speed Boost active",
        slow: "🐢 Slow Motion active",
        shield: "🛡 Shield active",
        mult: "✖2 Score active"
    };
    document.getElementById("powerStatus").innerText = status[type] || "None active";
}

function updatePower(timestamp) {
    if (!activePower) return;
    if (timestamp > powerEndTime) {
        activePower = null;
        player.shield = false;
        moveDelay = BASE_DELAY;
        document.getElementById("powerStatus").innerText = "None active";
    }
}

/* === LEADERBOARD === */
function loadLeaderboard() {
    const raw = localStorage.getItem("tileLeaderboard");
    if (!raw) return [];
    try {
        return JSON.parse(raw);
    } catch {
        return [];
    }
}

function saveLeaderboard(list) {
    localStorage.setItem("tileLeaderboard", JSON.stringify(list));
}

function addScoreToLeaderboard(name, score) {
    let list = loadLeaderboard();
    list.push({ name, score });
    list.sort((a, b) => b.score - a.score);
    list = list.slice(0, 10);
    saveLeaderboard(list);
    renderLeaderboard();
}

function renderLeaderboard() {
    const list = loadLeaderboard();
    const ul = document.getElementById("leaderboard");
    ul.innerHTML = "";
    list.forEach((entry, i) => {
        const li = document.createElement("li");
        li.textContent = `${i + 1}. ${entry.name} – ${entry.score}`;
        ul.appendChild(li);
    });
}

/* === START GAME === */
function startGame() {
    const name = document.getElementById("playerName").value || "Player";
    localStorage.setItem("tileName", name);

    player.x = Math.floor(MAP_SIZE / 2);
    player.y = Math.floor(MAP_SIZE / 2);
    player.dx = 1;
    player.dy = 0;
    player.color = document.getElementById("playerColor").value || "#00ffcc";
    player.shield = false;

    claimed.clear();
    trail = [];
    score = 0;
    document.getElementById("score").innerText = score;

    moveDelay = BASE_DELAY;
    activePower = null;
    document.getElementById("powerStatus").innerText = "None active";

    initBots();
    powerUps = [];

    running = true;
    lastMove = 0;
    requestAnimationFrame(loop);
}

/* === UPDATE === */
function update(timestamp) {
    updatePower(timestamp);

    // Player movement timing
    if (timestamp - lastMove < moveDelay) return;
    lastMove = timestamp;

    // Move player
    player.x += player.dx;
    player.y += player.dy;

    if (player.x < 0 || player.x >= MAP_SIZE || player.y < 0 || player.y >= MAP_SIZE) {
        if (player.shield) {
            player.x = Math.min(Math.max(player.x, 0), MAP_SIZE - 1);
            player.y = Math.min(Math.max(player.y, 0), MAP_SIZE - 1);
            player.shield = false;
        } else {
            return gameOver();
        }
    }

    const pKey = key(player.x, player.y);

    if (trail.includes(pKey) && !player.shield) {
        return gameOver();
    }

    trail.push(pKey);
    if (!claimed.has(pKey)) {
        claimed.add(pKey);
        let gain = 1;
        if (activePower === "mult") gain = 2;
        score += gain;
        document.getElementById("score").innerText = score;

        if (score > best) {
            best = score;
            document.getElementById("best").innerText = best;
            localStorage.setItem("tileBest", best);
        }
    }
    if (trail.length > 300) trail.shift();

    // Power‑up pickup
    for (let i = powerUps.length - 1; i >= 0; i--) {
        const pu = powerUps[i];
        if (pu.x === player.x && pu.y === player.y) {
            applyPower(pu.type);
            powerUps.splice(i, 1);
        }
    }

    // Bots
    bots.forEach(bot => {
        if (!bot.alive) return;
        if (Math.random() < 0.2) {
            const dir = randInt(0, 4);
            if (dir === 0) { bot.dx = 1; bot.dy = 0; }
            if (dir === 1) { bot.dx = -1; bot.dy = 0; }
            if (dir === 2) { bot.dx = 0; bot.dy = 1; }
            if (dir === 3) { bot.dx = 0; bot.dy = -1; }
        }

        bot.x += bot.dx;
        bot.y += bot.dy;

        if (bot.x < 0 || bot.x >= MAP_SIZE || bot.y < 0 || bot.y >= MAP_SIZE) {
            bot.dx *= -1;
            bot.dy *= -1;
            bot.x = Math.min(Math.max(bot.x, 0), MAP_SIZE - 1);
            bot.y = Math.min(Math.max(bot.y, 0), MAP_SIZE - 1);
        }

        if (bot.x === player.x && bot.y === player.y && !player.shield) {
            return gameOver();
        }
    });

    // Occasionally spawn power‑ups
    if (Math.random() < 0.02) spawnPowerUp();
}

/* === DRAW === */
function draw(timestamp) {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const camX = player.x * TILE_SIZE - (canvas.width / 2) / zoom;
    const camY = player.y * TILE_SIZE - (canvas.height / 2) / zoom;

    ctx.save();
    ctx.translate(canvas.width / 2, canvas.height / 2);
    ctx.scale(zoom, zoom);
    ctx.translate(-canvas.width / 2, -canvas.height / 2);

    const startX = Math.floor(camX / TILE_SIZE) - 2;
    const endX = Math.floor((camX + canvas.width / zoom) / TILE_SIZE) + 2;
    const startY = Math.floor(camY / TILE_SIZE) - 2;
    const endY = Math.floor((camY + canvas.height / zoom) / TILE_SIZE) + 2;

    const t = (timestamp || 0) / 1000;

    for (let gx = startX; gx <= endX; gx++) {
        if (gx < 0 || gx >= MAP_SIZE) continue;
        for (let gy = startY; gy <= endY; gy++) {
            if (gy < 0 || gy >= MAP_SIZE) continue;

            const px = gx * TILE_SIZE - camX;
            const py = gy * TILE_SIZE - camY;

            const pulse = (Math.sin((gx + gy) * 0.3 + t * 2) + 1) * 0.5;
            const base = 10 + Math.floor(pulse * 40);
            ctx.fillStyle = `rgb(0, ${base}, ${base * 3})`;
            ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);

            ctx.strokeStyle = "rgba(0,255,255,0.15)";
            ctx.lineWidth = 1;
            ctx.strokeRect(px, py, TILE_SIZE, TILE_SIZE);
        }
    }

    ctx.fillStyle = player.color + "55";
    trail.forEach(k => {
        const [tx, ty] = k.split(",").map(Number);
        const px = tx * TILE_SIZE - camX;
        const py = ty * TILE_SIZE - camY;
        ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
    });

    powerUps.forEach(pu => {
        const px = pu.x * TILE_SIZE - camX;
        const py = pu.y * TILE_SIZE - camY;
        let color = "#ffff00";
        if (pu.type === "speed") color = "#00ff00";
        if (pu.type === "slow") color = "#ff8800";
        if (pu.type === "shield") color = "#00aaff";
        if (pu.type === "mult") color = "#ff00ff";
        ctx.fillStyle = color;
        ctx.beginPath();
        ctx.arc(px + TILE_SIZE / 2, py + TILE_SIZE / 2, TILE_SIZE / 3, 0, Math.PI * 2);
        ctx.fill();
    });

    bots.forEach(bot => {
        if (!bot.alive) return;
        const px = bot.x * TILE_SIZE - camX;
        const py = bot.y * TILE_SIZE - camY;
        ctx.fillStyle = bot.color;
        ctx.fillRect(px, py, TILE_SIZE, TILE_SIZE);
    });

    ctx.shadowColor = player.color;
    ctx.shadowBlur = 20;
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x * TILE_SIZE - camX, player.y * TILE_SIZE - camY, TILE_SIZE, TILE_SIZE);
    ctx.shadowBlur = 0;

    if (player.shield) {
        ctx.strokeStyle = "#00ffff";
        ctx.lineWidth = 2;
        ctx.strokeRect(player.x * TILE_SIZE - camX, player.y * TILE_SIZE - camY, TILE_SIZE, TILE_SIZE);
    }

    ctx.restore();

    drawMinimap();
}

/* === MINIMAP === */
function drawMinimap() {
    mctx.clearRect(0, 0, mini.width, mini.height);
    mctx.fillStyle = "#050510";
    mctx.fillRect(0, 0, mini.width, mini.height);

    const scaleX = mini.width / MAP_SIZE;
    const scaleY = mini.height / MAP_SIZE;

    mctx.fillStyle = "rgba(0,255,255,0.2)";
    claimed.forEach(k => {
        const [x, y] = k.split(",").map(Number);
        mctx.fillRect(x * scaleX, y * scaleY, scaleX, scaleY);
    });

    bots.forEach(bot => {
        if (!bot.alive) return;
        mctx.fillStyle = bot.color;
        mctx.fillRect(bot.x * scaleX, bot.y * scaleY, scaleX + 1, scaleY + 1);
    });

    mctx.fillStyle = player.color;
    mctx.beginPath();
    mctx.arc(player.x * scaleX, player.y * scaleY, 3, 0, Math.PI * 2);
    mctx.fill();
}

/* === LOOP === */
function loop(timestamp) {
    if (!running) return;
    update(timestamp);
    draw(timestamp);
    requestAnimationFrame(loop);
}

/* === GAME OVER === */
function gameOver() {
    running = false;
    const name = localStorage.getItem("tileName") || "Player";
    addScoreToLeaderboard(name, score);
    alert("Game Over! Score: " + score);
}

/* === CONTROLS === */
document.addEventListener("keydown", e => {
    if (!running) return;
    if (e.key === "ArrowUp" || e.key === "w") { if (player.dy !== 1) { player.dx = 0; player.dy = -1; } }
    if (e.key === "ArrowDown" || e.key === "s") { if (player.dy !== -1) { player.dx = 0; player.dy = 1; } }
    if (e.key === "ArrowLeft" || e.key === "a") { if (player.dx !== 1) { player.dx = -1; player.dy = 0; } }
    if (e.key === "ArrowRight" || e.key === "d") { if (player.dx !== -1) { player.dx = 1; player.dy = 0; } }
});

canvas.addEventListener("wheel", e => {
    e.preventDefault();
    if (e.deltaY < 0) zoom += 0.1;
    else zoom -= 0.1;
    zoom = Math.max(0.6, Math.min(1.6, zoom));
    document.getElementById("zoomLabel").innerText = zoom.toFixed(1) + "x";
}, { passive: false });

/* === INIT === */
best = parseInt(localStorage.getItem("tileBest") || "0");
document.getElementById("best").innerText = best;

const savedName = localStorage.getItem("tileName");
if (savedName) document.getElementById("playerName").value = savedName;

renderLeaderboard();
</script>

</body>
</html>
