<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tile Runner – Infinite Play</title>
    <style>
        body {
            background: #111;
            color: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            text-align: center;
        }

        .page-wrapper {
            width: 100%;
            max-width: 900px;
            margin: 30px auto;
            background: #1b1b1b;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
        }

        h1 {
            font-size: 32px;
            margin-bottom: 10px;
        }

        .controls {
            margin: 10px 0 20px;
        }

        .label {
            font-size: 14px;
            margin-right: 5px;
        }

        input[type="text"] {
            padding: 6px 8px;
            border-radius: 6px;
            border: 1px solid #444;
            background: #222;
            color: #f5f5f5;
        }

        input[type="color"] {
            border: none;
            background: transparent;
            cursor: pointer;
        }

        .btn {
            display: inline-block;
            margin: 10px;
            padding: 10px 18px;
            background: #222;
            color: white;
            font-size: 16px;
            border-radius: 10px;
            border: 2px solid #444;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

        .btn:hover {
            background: #333;
            transform: scale(1.08);
            border-color: #7a2cff;
            box-shadow: 0 0 15px #7a2cff, 0 0 30px #7a2cff;
        }

        #gameCanvas {
            background: #000;
            border-radius: 8px;
            margin-top: 10px;
            box-shadow: 0 0 15px #000;
        }

        .info {
            margin-top: 10px;
            font-size: 14px;
            color: #ccc;
        }

        .score {
            margin-top: 10px;
            font-size: 18px;
        }

        .home-btn {
            position: fixed;
            top: 10px;
            left: 10px;
            background: #222;
            color: white;
            padding: 10px 15px;
            border-radius: 6px;
            text-decoration: none;
            font-size: 16px;
            border: 1px solid #444;
            transition: 0.25s;
            z-index: 9999;
        }

        .home-btn:hover {
            background: #333;
            transform: scale(1.05);
            border-color: #7a2cff;
            box-shadow: 0 0 10px #7a2cff;
        }

        .ad-space {
            width: 100%;
            height: 100px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 8px;
            margin-top: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #777;
            font-size: 14px;
        }
    </style>
</head>
<body>

<a href="https://judedude57.github.io" class="home-btn">Home</a>

<div class="page-wrapper">
    <h1>Tile Runner</h1>
    <div class="controls">
        <span class="label">Name:</span>
        <input type="text" id="playerName" placeholder="Player" />
        <span class="label">Color:</span>
        <input type="color" id="playerColor" value="#00ff88" />
        <button class="btn" onclick="startGame()">Start / Restart</button>
    </div>

    <canvas id="gameCanvas" width="500" height="500"></canvas>

    <div class="score">
        Score: <span id="score">0</span> |
        Best: <span id="bestScore">0</span>
    </div>

    <div class="info">
        Move with <b>WASD</b> or <b>Arrow Keys</b>.  
        Claim tiles by moving. Don’t hit the walls or your own trail.
    </div>

    <div class="ad-space">
        Ad Space (paste your code here)
    </div>
</div>

<script>
const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");

const gridSize = 25; // 25x25 grid
const tileSize = canvas.width / gridSize;

let player = { x: 12, y: 12, dx: 1, dy: 0, color: "#00ff88" };
let claimed = [];
let trail = [];
let running = false;
let score = 0;
let bestScore = 0;
let loopId = null;

function loadSettings() {
    const savedName = localStorage.getItem("tileRunnerName");
    const savedColor = localStorage.getItem("tileRunnerColor");
    const savedBest = localStorage.getItem("tileRunnerBest");

    if (savedName) document.getElementById("playerName").value = savedName;
    if (savedColor) {
        document.getElementById("playerColor").value = savedColor;
        player.color = savedColor;
    }
    if (savedBest) {
        bestScore = parseInt(savedBest, 10) || 0;
        document.getElementById("bestScore").innerText = bestScore;
    }
}

function saveSettings() {
    const name = document.getElementById("playerName").value || "Player";
    const color = document.getElementById("playerColor").value || "#00ff88";
    localStorage.setItem("tileRunnerName", name);
    localStorage.setItem("tileRunnerColor", color);
}

function startGame() {
    saveSettings();
    player.x = 12;
    player.y = 12;
    player.dx = 1;
    player.dy = 0;
    player.color = document.getElementById("playerColor").value || "#00ff88";
    claimed = [];
    trail = [];
    score = 0;
    document.getElementById("score").innerText = score;
    running = true;
    if (loopId) cancelAnimationFrame(loopId);
    gameLoop();
}

function gameLoop() {
    if (!running) return;

    update();
    draw();
    loopId = requestAnimationFrame(gameLoop);
}

function update() {
    // Move player
    player.x += player.dx;
    player.y += player.dy;

    // Check walls
    if (player.x < 0 || player.x >= gridSize || player.y < 0 || player.y >= gridSize) {
        gameOver();
        return;
    }

    const key = player.x + "," + player.y;

    // Check self trail collision
    if (trail.includes(key)) {
        gameOver();
        return;
    }

    // Add to trail and claimed
    trail.push(key);
    if (!claimed.includes(key)) {
        claimed.push(key);
        score++;
        document.getElementById("score").innerText = score;
        if (score > bestScore) {
            bestScore = score;
            document.getElementById("bestScore").innerText = bestScore;
            localStorage.setItem("tileRunnerBest", bestScore);
        }
    }

    // Limit trail length (optional)
    if (trail.length > 200) {
        trail.shift();
    }
}

function draw() {
    ctx.fillStyle = "#000";
    ctx.fillRect(0, 0, canvas.width, canvas.height);

    // Draw claimed tiles
    ctx.fillStyle = "#222";
    claimed.forEach(c => {
        const [cx, cy] = c.split(",").map(Number);
        ctx.fillRect(cx * tileSize, cy * tileSize, tileSize, tileSize);
    });

    // Draw trail
    ctx.fillStyle = player.color + "88";
    trail.forEach(c => {
        const [tx, ty] = c.split(",").map(Number);
        ctx.fillRect(tx * tileSize, ty * tileSize, tileSize, tileSize);
    });

    // Draw player
    ctx.fillStyle = player.color;
    ctx.fillRect(player.x * tileSize, player.y * tileSize, tileSize, tileSize);
}

function gameOver() {
    running = false;
    alert("Game Over! Score: " + score);
}

document.addEventListener("keydown", (e) => {
    if (!running) return;
    if (e.key === "ArrowUp" || e.key === "w") {
        if (player.dy === 1) return;
        player.dx = 0; player.dy = -1;
    } else if (e.key === "ArrowDown" || e.key === "s") {
        if (player.dy === -1) return;
        player.dx = 0; player.dy = 1;
    } else if (e.key === "ArrowLeft" || e.key === "a") {
        if (player.dx === 1) return;
        player.dx = -1; player.dy = 0;
    } else if (e.key === "ArrowRight" || e.key === "d") {
        if (player.dx === -1) return;
        player.dx = 1; player.dy = 0;
    }
});

loadSettings();
startGame();
</script>

</body>
</html>
