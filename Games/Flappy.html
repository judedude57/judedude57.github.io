<body>

  <div class="game-wrapper">

  <!-- PUSH PAGE ADS -->
  <script>
    (function(s){
      s.dataset.zone='10954674';
      s.src='https://nap5k.com/tag.min.js';
    })([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));
  </script>

  <!-- GAME SCRIPT -->
  <script>
    const canvas = document.getElementById("game");
    const ctx = canvas.getContext("2d");

    const scoreEl = document.getElementById("score");
    const bestEl = document.getElementById("best");
    const btnRestart = document.getElementById("btnRestart");

    const W = canvas.width;
    const H = canvas.height;

    let orb, pipes, score, bestScore, gameState, lastTime;
    let pipeTimer = 0;

    const GRAVITY = 0.35;
    const FLAP = -6.2;
    const PIPE_GAP = 150;
    const PIPE_WIDTH = 70;
    const PIPE_INTERVAL = 1500; // ms
    const MAX_DROP_SPEED = 10;

    const colors = ["#34ffea", "#ff2fd0", "#ffe45e", "#5b8dff"];

    function loadBest() {
      try {
        const stored = localStorage.getItem("neonFlappyOrbBest");
        bestScore = stored ? parseInt(stored, 10) : 0;
      } catch {
        bestScore = 0;
      }
      bestEl.textContent = bestScore;
    }

    function saveBest() {
      try {
        localStorage.setItem("neonFlappyOrbBest", String(bestScore));
      } catch {}
    }

    function resetGame() {
      orb = {
        x: W * 0.3,
        y: H * 0.5,
        r: 14,
        vy: 0
      };
      pipes = [];
      score = 0;
      scoreEl.textContent = score;
      pipeTimer = 0;
      gameState = "ready"; // ready, running, dead
      lastTime = performance.now();
      drawFrame(0);
    }

    function spawnPipe() {
      const margin = 60;
      const gapY = margin + Math.random() * (H - 2 * margin - PIPE_GAP);
      pipes.push({
        x: W + PIPE_WIDTH,
        gapY,
        passed: false
      });
    }

    function flap() {
      if (gameState === "dead") return;
      if (gameState === "ready") {
        gameState = "running";
      }
      orb.vy = FLAP;
    }

    function update(dt) {
      if (gameState !== "running") return;

      // Orb physics
      orb.vy += GRAVITY;
      if (orb.vy > MAX_DROP_SPEED) orb.vy = MAX_DROP_SPEED;
      orb.y += orb.vy;

      // Pipes
      pipeTimer += dt;
      if (pipeTimer >= PIPE_INTERVAL) {
        pipeTimer = 0;
        spawnPipe();
      }

      for (let i = pipes.length - 1; i >= 0; i--) {
        const p = pipes[i];
        p.x -= 2.8;

        // Scoring
        if (!p.passed && p.x + PIPE_WIDTH < orb.x) {
          p.passed = true;
          score++;
          scoreEl.textContent = score;
          if (score > bestScore) {
            bestScore = score;
            bestEl.textContent = bestScore;
            saveBest();
          }
        }

        // Remove off-screen
        if (p.x + PIPE_WIDTH < -20) {
          pipes.splice(i, 1);
        }
      }

      // Collision with ground/ceiling
      if (orb.y - orb.r <= 0 || orb.y + orb.r >= H) {
        gameOver();
        return;
      }

      // Collision with pipes
      for (const p of pipes) {
        if (orb.x + orb.r > p.x && orb.x - orb.r < p.x + PIPE_WIDTH) {
          if (orb.y - orb.r < p.gapY || orb.y + orb.r > p.gapY + PIPE_GAP) {
            gameOver();
            return;
          }
        }
      }
    }

    function gameOver() {
      gameState = "dead";
    }

    function drawBackground() {
      const grd = ctx.createRadialGradient(
        W * 0.5,
        H * 0.2,
        40,
        W * 0.5,
        H * 0.5,
        H * 0.9
      );
      grd.addColorStop(0, "#181830");
      grd.addColorStop(0.5, "#050510");
      grd.addColorStop(1, "#000000");
      ctx.fillStyle = grd;
      ctx.fillRect(0, 0, W, H);

      // Subtle grid
      ctx.strokeStyle = "rgba(255,255,255,0.04)";
      ctx.lineWidth = 1;
      const step = 30;
      ctx.beginPath();
      for (let x = 0; x < W; x += step) {
        ctx.moveTo(x, 0);
        ctx.lineTo(x, H);
      }
      for (let y = 0; y < H; y += step) {
        ctx.moveTo(0, y);
        ctx.lineTo(W, y);
      }
      ctx.stroke();
    }

    function drawPipes() {
      for (let i = 0; i < pipes.length; i++) {
        const p = pipes[i];
        const color = colors[i % colors.length];

        ctx.fillStyle = color;
        ctx.shadowColor = color;
        ctx.shadowBlur = 18;

        // Top pipe
        ctx.fillRect(p.x, 0, PIPE_WIDTH, p.gapY);

        // Bottom pipe
        ctx.fillRect(p.x, p.gapY + PIPE_GAP, PIPE_WIDTH, H - (p.gapY + PIPE_GAP));

        // Borders
        ctx.shadowBlur = 0;
        ctx.strokeStyle = "rgba(0,0,0,0.7)";
        ctx.lineWidth = 2;
        ctx.strokeRect(p.x, 0, PIPE_WIDTH, p.gapY);
        ctx.strokeRect(p.x, p.gapY + PIPE_GAP, PIPE_WIDTH, H - (p.gapY + PIPE_GAP));
      }
    }

    function drawOrb() {
      const gradient = ctx.createRadialGradient(
        orb.x - 4,
        orb.y - 4,
        4,
        orb.x,
        orb.y,
        orb.r + 6
      );
      gradient.addColorStop(0, "#ffffff");
      gradient.addColorStop(0.3, "#d5fff9");
      gradient.addColorStop(0.7, "#34ffea");
      gradient.addColorStop(1, "rgba(52,255,234,0)");

      ctx.fillStyle = gradient;
      ctx.shadowColor = "#34ffea";
      ctx.shadowBlur = 20;
      ctx.beginPath();
      ctx.arc(orb.x, orb.y, orb.r, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      ctx.strokeStyle = "#0b1f2b";
      ctx.lineWidth = 2;
      ctx.stroke();
    }

    function drawText() {
      ctx.fillStyle = "rgba(255,255,255,0.9)";
      ctx.textAlign = "center";

      if (gameState === "ready") {
        ctx.font = "20px system-ui";
        ctx.fillText("Tap / Click / Space to start", W / 2, H * 0.45);
        ctx.font = "14px system-ui";
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.fillText("Stay between the neon gates", W / 2, H * 0.52);
      } else if (gameState === "dead") {
        ctx.font = "26px system-ui";
        ctx.fillStyle = "#ff3366";
        ctx.shadowColor = "#ff3366";
        ctx.shadowBlur = 16;
        ctx.fillText("Game Over", W / 2, H * 0.42);
        ctx.shadowBlur = 0;

        ctx.font = "16px system-ui";
        ctx.fillStyle = "rgba(255,255,255,0.9)";
        ctx.fillText(`Score: ${score}  •  Best: ${bestScore}`, W / 2, H * 0.5);

        ctx.font = "14px system-ui";
        ctx.fillStyle = "rgba(255,255,255,0.7)";
        ctx.fillText("Press Space / Tap / Restart", W / 2, H * 0.58);
      }
    }

    function drawFrame(dt) {
      drawBackground();
      drawPipes();
      drawOrb();
      drawText();
    }

    function loop(timestamp) {
      const dt = timestamp - lastTime;
      lastTime = timestamp;

      update(dt);
      drawFrame(dt);

      requestAnimationFrame(loop);
    }

    function handlePointer() {
      if (gameState === "dead") {
        resetGame();
        return;
      }
      flap();
    }

    canvas.addEventListener("mousedown", handlePointer);
    canvas.addEventListener("touchstart", (e) => {
      e.preventDefault();
      handlePointer();
    });

    window.addEventListener("keydown", (e) => {
      if ([" ", "ArrowUp", "w", "W"].includes(e.key)) {
        e.preventDefault();
        if (gameState === "dead") {
          resetGame();
          return;
        }
        flap();
      }
    });

    btnRestart.addEventListener("click", () => {
      resetGame();
    });

    loadBest();
    resetGame();
    requestAnimationFrame((t) => {
      lastTime = t;
      loop(t);
    });
  </script>
</body>
