<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Space Roks – Infinite Play</title>
<style>
    body {
        margin: 0;
        background: black;
        overflow: hidden;
        font-family: Arial, sans-serif;
        color: white;
        text-align: center;
    }

    #ui {
        position: absolute;
        top: 20px;
        width: 100%;
        z-index: 10;
        font-size: 22px;
        font-weight: bold;
        pointer-events: none;
    }

    #menu, #gameOver {
        position: absolute;
        top: 0; left: 0;
        width: 100%; height: 100%;
        background: rgba(0,0,0,0.85);
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        z-index: 20;
    }

    button {
        padding: 15px 30px;
        margin: 10px;
        font-size: 20px;
        cursor: pointer;
        border-radius: 10px;
        border: none;
    }

    #homeBtn {
        position: absolute;
        top: 20px;
        left: 20px;
        z-index: 30;
        padding: 10px 20px;
        font-size: 18px;
    }
</style>
</head>
<body>

<button id="homeBtn">🏠 Home</button>

<div id="ui">Lives: <span id="lives">3</span></div>

<div id="menu">
    <h1>🚀 SPACE ROKS</h1>
    <p>Infinite Play Edition</p>
    <button id="startBtn">Start Game</button>
</div>

<div id="gameOver" style="display:none;">
    <h1>💀 GAME OVER 💀</h1>
    <button id="restartBtn">Play Again</button>
</div>

<canvas id="gameCanvas"></canvas>

<!-- ADS SCRIPT -->
<script>
(function(s){
    s.dataset.zone='10951295';
    s.src='https://n6wxm.com/vignette.min.js';
})([document.documentElement, document.body].filter(Boolean).pop().appendChild(document.createElement('script')));
</script>

<script>
/* -------------------------
   BASIC GAME SETUP
-------------------------- */

const canvas = document.getElementById("gameCanvas");
const ctx = canvas.getContext("2d");
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

let lives = 3;
let playing = false;
let asteroids = [];
let bullets = [];
let ship;

function resetGame() {
    lives = 3;
    document.getElementById("lives").innerText = lives;
    asteroids = [];
    bullets = [];
    ship = { x: canvas.width/2, y: canvas.height/2, angle: 0 };
}

/* -------------------------
   ASTEROIDS + BULLETS
-------------------------- */

function spawnAsteroid() {
    asteroids.push({
        x: Math.random() * canvas.width,
        y: -50,
        size: 40 + Math.random()*40,
        speed: 1 + Math.random()*2
    });
}

function updateAsteroids() {
    asteroids.forEach(a => a.y += a.speed);
    asteroids = asteroids.filter(a => a.y < canvas.height + 100);
}

function updateBullets() {
    bullets.forEach(b => {
        b.x += Math.cos(b.angle) * 10;
        b.y += Math.sin(b.angle) * 10;
    });
    bullets = bullets.filter(b => b.x > 0 && b.x < canvas.width && b.y > 0 && b.y < canvas.height);
}

function detectCollisions() {
    asteroids.forEach((a, ai) => {
        bullets.forEach((b, bi) => {
            const dx = a.x - b.x;
            const dy = a.y - b.y;
            if (Math.hypot(dx, dy) < a.size) {
                asteroids.splice(ai, 1);
                bullets.splice(bi, 1);
            }
        });

        const dx = a.x - ship.x;
        const dy = a.y - ship.y;
        if (Math.hypot(dx, dy) < a.size) {
            lives--;
            document.getElementById("lives").innerText = lives;
            asteroids.splice(ai, 1);

            if (lives <= 0) endGame();
        }
    });
}

/* -------------------------
   DRAWING
-------------------------- */

function drawShip() {
    ctx.save();
    ctx.translate(ship.x, ship.y);
    ctx.rotate(ship.angle);
    ctx.beginPath();
    ctx.moveTo(20, 0);
    ctx.lineTo(-20, 15);
    ctx.lineTo(-20, -15);
    ctx.closePath();
    ctx.strokeStyle = "white";
    ctx.stroke();
    ctx.restore();
}

function drawAsteroids() {
    ctx.strokeStyle = "gray";
    asteroids.forEach(a => {
        ctx.beginPath();
        ctx.arc(a.x, a.y, a.size, 0, Math.PI*2);
        ctx.stroke();
    });
}

function drawBullets() {
    ctx.fillStyle = "yellow";
    bullets.forEach(b => {
        ctx.beginPath();
        ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
        ctx.fill();
    });
}

/* -------------------------
   GAME LOOP
-------------------------- */

function gameLoop() {
    if (!playing) return;

    ctx.clearRect(0,0,canvas.width,canvas.height);

    if (Math.random() < 0.02) spawnAsteroid();

    updateAsteroids();
    updateBullets();
    detectCollisions();

    drawShip();
    drawAsteroids();
    drawBullets();

    requestAnimationFrame(gameLoop);
}

/* -------------------------
   INPUT
-------------------------- */

document.addEventListener("keydown", e => {
    if (!playing) return;

    if (e.key === "ArrowLeft" || e.key === "a") ship.angle -= 0.1;
    if (e.key === "ArrowRight" || e.key === "d") ship.angle += 0.1;

    if (e.key === " " || e.key === "ArrowUp" || e.key === "w") {
        bullets.push({
            x: ship.x,
            y: ship.y,
            angle: ship.angle
        });
    }
});

/* -------------------------
   MENU + ADS + BUTTONS
-------------------------- */

function showAdThen(callback) {
    try { propellerAds.show(); } catch(e) {}
    setTimeout(callback, 1500);
}

document.getElementById("startBtn").onclick = () => {
    showAdThen(() => {
        document.getElementById("menu").style.display = "none";
        resetGame();
        playing = true;
        gameLoop();
    });
};

document.getElementById("restartBtn").onclick = () => {
    showAdThen(() => {
        document.getElementById("gameOver").style.display = "none";
        resetGame();
        playing = true;
        gameLoop();
    });
};

document.getElementById("homeBtn").onclick = () => {
    window.location.href = "/Menus/Games.html";
};

function endGame() {
    playing = false;
    showAdThen(() => {
        document.getElementById("gameOver").style.display = "flex";
    });
}
</script>

</body>
</html>
