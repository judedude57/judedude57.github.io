<!DOCTYPE html>
<html>
<head>
    <meta name="c9e579e1094c918217dfc8fed81d77b5c0f9e9fa" content="c9e579e1094c918217dfc8fed81d77b5c0f9e9fa" />
    <meta charset="UTF-8">
    <title>Infinite Play – Home</title>
    <link rel="icon" type="image/png" href="Copilot_20260430_082824 (1).png">
    <style>
        body {
            background: #111;
            color: #f5f5f5;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        /* Page wrapper */
        .page-wrapper {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: center;
            position: relative;
            padding-top: 40px;
        }

        /* Left + Right ad columns (empty for you to fill) */
        .ad-left, .ad-right {
            width: 160px;
            min-height: 600px;
            background: #1a1a1a;
            border: 1px solid #333;
            border-radius: 6px;
            position: absolute;
            top: 40px;
        }
        .ad-left { left: -180px; }
        .ad-right { right: -180px; }

        .ad-left p, .ad-right p {
            text-align: center;
            font-size: 12px;
            color: #777;
            padding: 10px;
        }

        /* Main content */
        .content {
            width: 100%;
            max-width: 700px;
            background: #1b1b1b;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 0 15px rgba(0,0,0,0.7);
            text-align: center;
        }

        h1 {
            font-size: 40px;
            margin-bottom: 20px;
        }

        /* Menu buttons with glow + hover animation */
        .menu-btn {
            display: block;
            width: 80%;
            margin: 20px auto;
            padding: 18px;
            background: #222;
            color: white;
            text-decoration: none;
            font-size: 22px;
            border-radius: 10px;
            border: 2px solid #444;
            transition: 0.25s ease;
            box-shadow: 0 0 10px rgba(0,0,0,0.4);
        }

        .menu-btn:hover {
            background: #333;
            transform: scale(1.08);
            border-color: #7a2cff;
            box-shadow: 0 0 15px #7a2cff, 0 0 30px #7a2cff;
        }

        /* Logo */
        .logo {
            margin-top: 40px;
            width: 200px;
            opacity: 0.95;
        }

        @media (max-width: 1000px) {
            .ad-left, .ad-right {
                display: none;
            }
        }
    </style>
</head>
<body>

<div class="page-wrapper">

    <!-- Left Ad (you add your code here) -->
    <div class="ad-left">
        <p>Ad Space</p>
    </div>

    <!-- Main Content -->
    <div class="content">
        <h1>Infinite Play</h1>

        <a href="Menus/Games.html" class="menu-btn">Games</a>
        <a href="Menus/tools.html" class="menu-btn">Tools & Generators</a>

        <img src="https://copilot.microsoft.com/th/id/BCO.75cdd897-a13c-4dc9-a954-d9af160edc26.png"
             alt="Infinite Play Logo"
             class="logo">
    </div>

    <!-- Right Ad (you add your code here) -->
    <div class="ad-right">
        <p>Ad Space</p>
    </div>

</div>

</body>
</html>
